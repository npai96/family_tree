name: Deploy to AWS EC2 over SSH (Fallback)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      APP_IMAGE: family-tree:${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build application image
        run: |
          docker build -t "$APP_IMAGE" .

      - name: Export application image
        run: |
          IMAGE_ARCHIVE="/tmp/family-tree-image.tar"
          WORKSPACE_IMAGE_ARCHIVE="$GITHUB_WORKSPACE/family-tree-image.tar"
          rm -f "$IMAGE_ARCHIVE" "$WORKSPACE_IMAGE_ARCHIVE"
          docker save -o "$IMAGE_ARCHIVE" "$APP_IMAGE"
          cp "$IMAGE_ARCHIVE" "$WORKSPACE_IMAGE_ARCHIVE"
          chmod 0644 "$IMAGE_ARCHIVE" "$WORKSPACE_IMAGE_ARCHIVE"
          ls -lh "$IMAGE_ARCHIVE" "$WORKSPACE_IMAGE_ARCHIVE"

      - name: Create deploy config bundle
        run: |
          CONFIG_ARCHIVE="/tmp/family-tree-config.tgz"
          WORKSPACE_CONFIG_ARCHIVE="$GITHUB_WORKSPACE/family-tree-config.tgz"
          rm -f "$CONFIG_ARCHIVE" "$WORKSPACE_CONFIG_ARCHIVE"
          tar -czf "$CONFIG_ARCHIVE" \
            Caddyfile \
            docker-compose.prod.yml \
            deploy/ec2/deploy.sh
          cp "$CONFIG_ARCHIVE" "$WORKSPACE_CONFIG_ARCHIVE"
          chmod 0644 "$CONFIG_ARCHIVE" "$WORKSPACE_CONFIG_ARCHIVE"
          ls -lh "$CONFIG_ARCHIVE" "$WORKSPACE_CONFIG_ARCHIVE"

      - name: Check SSH reachability
        env:
          HOST: ${{ secrets.AWS_EC2_HOST }}
        run: |
          python - <<'PY'
          import os
          import socket
          import sys

          host = os.environ["HOST"]
          try:
              with socket.create_connection((host, 22), timeout=15):
                  print(f"SSH reachable on {host}:22")
          except OSError as exc:
              print(f"Cannot reach {host}:22 from this GitHub runner: {exc}", file=sys.stderr)
              print("Check the EC2 security group, NACL, host value, and public IP/DNS.", file=sys.stderr)
              sys.exit(1)
          PY

      - name: Upload deploy artifacts to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.AWS_EC2_HOST }}
          username: ${{ secrets.AWS_EC2_USER }}
          key: ${{ secrets.AWS_EC2_SSH_KEY }}
          source: family-tree-config.tgz,family-tree-image.tar
          target: /tmp
          strip_components: 0
          timeout: 2m
          command_timeout: 30m

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_EC2_HOST }}
          username: ${{ secrets.AWS_EC2_USER }}
          key: ${{ secrets.AWS_EC2_SSH_KEY }}
          timeout: 2m
          command_timeout: 15m
          script: |
            set -euo pipefail
            if ! command -v docker >/dev/null 2>&1; then
              echo "Docker not found. Run deploy/ec2/bootstrap.sh on server first."
              exit 1
            fi
            mkdir -p "$HOME/apps/family_tree"
            mkdir -p "$HOME/family_tree_data/data"
            mkdir -p "$HOME/family_tree_data/media"
            RELEASE_SHA="${{ github.sha }}"
            APP_IMAGE="family-tree:${{ github.sha }}"
            tar -xzf /tmp/family-tree-config.tgz -C "$HOME/apps/family_tree"
            chmod +x "$HOME/apps/family_tree/deploy/ec2/deploy.sh"
            "$HOME/apps/family_tree/deploy/ec2/deploy.sh" \
              "$RELEASE_SHA" \
              "${{ secrets.APP_DOMAIN }}" \
              "$APP_IMAGE"
