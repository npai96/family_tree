services:
  app:
    image: "${APP_IMAGE}"
    environment:
      ALLOW_LEGACY_X_USER_ID: "${ALLOW_LEGACY_X_USER_ID:-false}"
      DB_PATH: /data/mvp.db
      MEDIA_DIR: /app/app/media
    volumes:
      - "${DATA_DIR}:/data"
      - "${MEDIA_DIR}:/app/app/media"
    expose:
      - "8000"
    restart: unless-stopped

  caddy:
    image: caddy:2
    depends_on:
      - app
    environment:
      DOMAIN: "${DOMAIN}"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
