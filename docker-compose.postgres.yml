services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: family_tree
      POSTGRES_USER: family_tree
      POSTGRES_PASSWORD: family_tree_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/runtime_postgres.sql:/docker-entrypoint-initdb.d/001-runtime_postgres.sql:ro

volumes:
  postgres_data:
