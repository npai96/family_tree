<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Family Tree MVP</title>
    <style>
      :root {
        --bg: #f4f7f9;
        --panel: #ffffff;
        --line: #d5dee6;
        --ink: #17222f;
        --muted: #5f6f82;
        --accent: #0e7490;
      }
      body {
        margin: 0;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        color: var(--ink);
        background: linear-gradient(160deg, #e6f4f8, var(--bg));
      }
      .app {
        max-width: 1280px;
        margin: 0 auto;
        padding: 14px;
      }
      h1, h3 {
        margin: 0 0 10px 0;
      }
      .grid {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      }
      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 12px;
      }
      label {
        display: block;
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 4px;
      }
      input, select, button {
        width: 100%;
        box-sizing: border-box;
        padding: 8px;
        border: 1px solid var(--line);
        border-radius: 8px;
        margin-bottom: 8px;
        background: #fff;
      }
      button {
        border: none;
        background: var(--accent);
        color: #fff;
        cursor: pointer;
        font-weight: 600;
      }
      button.secondary {
        background: #475569;
      }
      .status {
        min-height: 20px;
        color: #0f766e;
        margin-bottom: 8px;
      }
      .list {
        max-height: 220px;
        overflow: auto;
        border: 1px dashed var(--line);
        border-radius: 8px;
        padding: 8px;
      }
      .item {
        padding: 6px 0;
        border-bottom: 1px dotted var(--line);
        font-size: 13px;
      }
      .item:last-child {
        border-bottom: none;
      }
      .muted {
        color: var(--muted);
        font-size: 12px;
      }
      .graph-shell {
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fbfdff;
      }
      .pill {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 11px;
        background: #e2e8f0;
        margin-left: 6px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script>
      const { useEffect, useMemo, useState } = React;

      function GraphView({ subgraph, rootPersonId }) {
        if (!subgraph || !subgraph.persons || subgraph.persons.length === 0) {
          return React.createElement("div", { className: "muted" }, "Load a subgraph to visualize it.");
        }

        const nodes = subgraph.persons;
        const edges = subgraph.relationships;
        const nameById = {};
        nodes.forEach((n) => { nameById[n.id] = n.full_name; });

        const adjacency = {};
        edges.forEach((e) => {
          if (!adjacency[e.from_person_id]) adjacency[e.from_person_id] = [];
          adjacency[e.from_person_id].push(e.to_person_id);
        });

        const levelMap = {};
        const queue = [[rootPersonId, 0]];
        levelMap[rootPersonId] = 0;
        while (queue.length) {
          const [id, level] = queue.shift();
          const next = adjacency[id] || [];
          next.forEach((child) => {
            if (levelMap[child] === undefined) {
              levelMap[child] = level + 1;
              queue.push([child, level + 1]);
            }
          });
        }
        nodes.forEach((n) => {
          if (levelMap[n.id] === undefined) levelMap[n.id] = 0;
        });

        const groups = {};
        nodes.forEach((n) => {
          const lv = levelMap[n.id];
          if (!groups[lv]) groups[lv] = [];
          groups[lv].push(n);
        });

        const levels = Object.keys(groups).map(Number).sort((a, b) => a - b);
        const positioned = {};
        const colGap = 220;
        const rowGap = 110;
        levels.forEach((lv) => {
          const col = groups[lv];
          col.forEach((node, idx) => {
            positioned[node.id] = {
              x: 120 + lv * colGap,
              y: 80 + idx * rowGap,
            };
          });
        });

        const maxLevel = levels.length ? Math.max(...levels) : 0;
        const maxRows = Math.max(1, ...Object.values(groups).map((g) => g.length));
        const width = 260 + (maxLevel + 1) * colGap;
        const height = 180 + maxRows * rowGap;

        return React.createElement("div", { className: "graph-shell" },
          React.createElement("svg", { width, height }, [
            ...edges.map((e) => {
              const from = positioned[e.from_person_id];
              const to = positioned[e.to_person_id];
              if (!from || !to) return null;
              return React.createElement("g", { key: `edge-${e.id}` }, [
                React.createElement("line", {
                  key: "line",
                  x1: from.x + 70,
                  y1: from.y + 20,
                  x2: to.x - 70,
                  y2: to.y + 20,
                  stroke: "#8aa4b5",
                  strokeWidth: 2
                }),
                React.createElement("text", {
                  key: "text",
                  x: (from.x + to.x) / 2,
                  y: (from.y + to.y) / 2 - 4,
                  textAnchor: "middle",
                  fill: "#5f6f82",
                  fontSize: 11,
                }, e.relationship_type)
              ]);
            }),
            ...nodes.map((n) => {
              const p = positioned[n.id];
              const isRoot = n.id === rootPersonId;
              return React.createElement("g", { key: `node-${n.id}` }, [
                React.createElement("rect", {
                  key: "rect",
                  x: p.x - 70,
                  y: p.y,
                  width: 140,
                  height: 40,
                  rx: 10,
                  ry: 10,
                  fill: isRoot ? "#0e7490" : "#ffffff",
                  stroke: isRoot ? "#0e7490" : "#9fb6c4",
                  strokeWidth: 1.5,
                }),
                React.createElement("text", {
                  key: "name",
                  x: p.x,
                  y: p.y + 22,
                  textAnchor: "middle",
                  fill: isRoot ? "#ffffff" : "#17222f",
                  fontSize: 12,
                }, nameById[n.id] || n.id.slice(0, 8))
              ]);
            })
          ])
        );
      }

      function App() {
        const [users, setUsers] = useState([]);
        const [activeUserId, setActiveUserId] = useState(localStorage.getItem("activeUserId") || "");
        const [circles, setCircles] = useState([]);
        const [selectedCircle, setSelectedCircle] = useState("");
        const [members, setMembers] = useState([]);
        const [persons, setPersons] = useState([]);
        const [relationships, setRelationships] = useState([]);
        const [changeRequests, setChangeRequests] = useState([]);
        const [contextEvents, setContextEvents] = useState([]);
        const [timeline, setTimeline] = useState([]);
        const [subgraph, setSubgraph] = useState(null);
        const [lastRoot, setLastRoot] = useState("");
        const [status, setStatus] = useState("");

        const headers = useMemo(() => {
          if (!activeUserId) return { "Content-Type": "application/json" };
          return { "Content-Type": "application/json", "X-User-Id": activeUserId };
        }, [activeUserId]);

        const personOptions = useMemo(() => persons.map((p) => ({ value: p.id, label: p.full_name })), [persons]);

        function setActiveUser(id) {
          setActiveUserId(id);
          localStorage.setItem("activeUserId", id || "");
        }

        async function requestJson(url, options = {}) {
          const res = await fetch(url, options);
          if (!res.ok) {
            const body = await res.json().catch(() => ({ detail: "Request failed" }));
            throw new Error(body.detail || "Request failed");
          }
          return res.json();
        }

        async function loadUsers() {
          const data = await requestJson("/users");
          setUsers(data);
          if (!activeUserId && data.length) setActiveUser(data[0].id);
        }

        async function loadCircles() {
          if (!activeUserId) return setCircles([]);
          const data = await requestJson("/circles", { headers });
          setCircles(data);
          if (!data.length) {
            setSelectedCircle("");
            return;
          }
          const exists = data.some((c) => c.id === selectedCircle);
          if (!selectedCircle || !exists) setSelectedCircle(data[0].id);
        }

        async function loadCircleData(circleId) {
          if (!activeUserId || !circleId) {
            setMembers([]); setPersons([]); setRelationships([]); setChangeRequests([]); setContextEvents([]); setTimeline([]);
            return;
          }
          const [m, p, r, cr, ce] = await Promise.all([
            requestJson(`/circles/${circleId}/members`, { headers }),
            requestJson(`/circles/${circleId}/persons`, { headers }),
            requestJson(`/circles/${circleId}/relationships`, { headers }),
            requestJson(`/circles/${circleId}/change-requests`, { headers }),
            requestJson(`/circles/${circleId}/context-events`, { headers }),
          ]);
          setMembers(m);
          setPersons(p);
          setRelationships(r);
          setChangeRequests(cr);
          setContextEvents(ce);
        }

        useEffect(() => { loadUsers().catch((e) => setStatus(e.message)); }, []);
        useEffect(() => {
          setSelectedCircle("");
          setSubgraph(null);
          setTimeline([]);
          loadCircles().catch((e) => setStatus(e.message));
        }, [activeUserId]);
        useEffect(() => { loadCircleData(selectedCircle).catch((e) => setStatus(e.message)); }, [activeUserId, selectedCircle]);

        async function createUser(e) {
          e.preventDefault();
          const display_name = e.target.display_name.value.trim();
          if (!display_name) return;
          const user = await requestJson("/users", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ display_name }),
          });
          setStatus("User created");
          e.target.reset();
          await loadUsers();
          setActiveUser(user.id);
        }

        async function createCircle(e) {
          e.preventDefault();
          const name = e.target.name.value.trim();
          if (!name) return;
          const circle = await requestJson("/circles", {
            method: "POST",
            headers,
            body: JSON.stringify({ name }),
          });
          setStatus("Circle created");
          e.target.reset();
          await loadCircles();
          setSelectedCircle(circle.id);
        }

        async function addMember(e) {
          e.preventDefault();
          const user_id = e.target.user_id.value;
          const role = e.target.role.value;
          await requestJson(`/circles/${selectedCircle}/members`, {
            method: "POST",
            headers,
            body: JSON.stringify({ user_id, role }),
          });
          setStatus("Member upserted");
          await loadCircleData(selectedCircle);
        }

        async function addPerson(e) {
          e.preventDefault();
          const full_name = e.target.full_name.value.trim();
          const religion = e.target.religion.value.trim() || null;
          await requestJson(`/circles/${selectedCircle}/persons`, {
            method: "POST",
            headers,
            body: JSON.stringify({ full_name, religion }),
          });
          setStatus("Person created");
          e.target.reset();
          await loadCircleData(selectedCircle);
        }

        async function addRelationship(e) {
          e.preventDefault();
          await requestJson(`/circles/${selectedCircle}/relationships`, {
            method: "POST",
            headers,
            body: JSON.stringify({
              from_person_id: e.target.from_person_id.value,
              to_person_id: e.target.to_person_id.value,
              relationship_type: e.target.relationship_type.value.trim(),
            }),
          });
          setStatus("Relationship created");
          e.target.reset();
          await loadCircleData(selectedCircle);
        }

        async function loadSubgraph(e) {
          e.preventDefault();
          const root_person_id = e.target.root_person_id.value;
          const direction = e.target.direction.value;
          const depth = Number(e.target.depth.value || 2);
          const data = await requestJson(
            `/circles/${selectedCircle}/graph/subgraph?root_person_id=${root_person_id}&direction=${direction}&depth=${depth}`,
            { headers }
          );
          setSubgraph(data);
          setLastRoot(root_person_id);
          setStatus(`Subgraph loaded: ${data.persons.length} nodes, ${data.relationships.length} edges`);
        }

        async function createChangeRequest(e) {
          e.preventDefault();
          const entity_id = e.target.entity_id.value;
          const religion = e.target.religion.value.trim() || null;
          await requestJson(`/circles/${selectedCircle}/change-requests`, {
            method: "POST",
            headers,
            body: JSON.stringify({ entity_type: "person", entity_id, proposed_patch_json: { religion } }),
          });
          setStatus("Change request created");
          e.target.reset();
          await loadCircleData(selectedCircle);
        }

        async function reviewRequest(id, action) {
          await requestJson(`/circles/${selectedCircle}/change-requests/${id}/${action}`, {
            method: "POST",
            headers,
            body: JSON.stringify({ review_comment: `${action} from UI` }),
          });
          setStatus(`Change request ${action}`);
          await loadCircleData(selectedCircle);
        }

        async function createContextEvent(e) {
          e.preventDefault();
          await requestJson(`/circles/${selectedCircle}/context-events`, {
            method: "POST",
            headers,
            body: JSON.stringify({
              date: e.target.date.value,
              title: e.target.title.value.trim(),
              event_type: e.target.event_type.value,
              location_name: e.target.location_name.value.trim() || null,
              description: e.target.description.value.trim() || null,
            }),
          });
          setStatus("Context event created");
          e.target.reset();
          await loadCircleData(selectedCircle);
        }

        async function linkEventToPerson(e) {
          e.preventDefault();
          await requestJson(`/circles/${selectedCircle}/persons/${e.target.person_id.value}/context-links`, {
            method: "POST",
            headers,
            body: JSON.stringify({
              context_event_id: e.target.context_event_id.value,
              relevance_note: e.target.relevance_note.value.trim() || null,
            }),
          });
          setStatus("Event linked to person");
        }

        async function loadTimeline(e) {
          e.preventDefault();
          const person_id = e.target.person_id.value;
          const data = await requestJson(`/circles/${selectedCircle}/persons/${person_id}/timeline`, { headers });
          setTimeline(data);
          setStatus(`Timeline loaded: ${data.length} events`);
        }

        return React.createElement("div", { className: "app" }, [
          React.createElement("h1", { key: "h1" }, "Family Tree MVP"),
          React.createElement("div", { className: "status", key: "status" }, status),
          React.createElement(
            "div",
            { className: "muted", key: "ctx" },
            activeUserId
              ? `Active user: ${users.find((u) => u.id === activeUserId)?.display_name || activeUserId.slice(0, 8)}`
              : "No active user selected"
          ),
          React.createElement("div", { className: "grid", key: "top-grid" }, [
            React.createElement("form", { className: "card", onSubmit: (e) => createUser(e).catch((x) => setStatus(x.message)), key: "users" }, [
              React.createElement("h3", { key: "h" }, "Users"),
              React.createElement("input", { key: "i1", name: "display_name", required: true, placeholder: "Display name" }),
              React.createElement("button", { key: "b1", type: "submit" }, "Create User"),
              React.createElement("label", { key: "l2" }, "Active User"),
              React.createElement(
                "select",
                { key: "s1", value: activeUserId, onChange: (e) => setActiveUser(e.target.value) },
                [React.createElement("option", { key: "blank", value: "" }, "Select user")]
                  .concat(users.map((u) => React.createElement("option", { key: u.id, value: u.id }, u.display_name)))
              ),
            ]),
            React.createElement("form", { className: "card", onSubmit: (e) => createCircle(e).catch((x) => setStatus(x.message)), key: "circles" }, [
              React.createElement("h3", { key: "h" }, "Circles"),
              React.createElement("input", { key: "i1", name: "name", required: true, placeholder: "Circle name" }),
              React.createElement("button", { key: "b1", type: "submit" }, "Create Circle"),
              React.createElement("label", { key: "l2" }, "Active Circle"),
              React.createElement(
                "select",
                { key: "s1", value: selectedCircle, onChange: (e) => setSelectedCircle(e.target.value) },
                [React.createElement("option", { key: "blank", value: "" }, "Select circle")]
                  .concat(circles.map((c) => React.createElement("option", { key: c.id, value: c.id }, c.name)))
              ),
            ]),
            React.createElement("form", { className: "card", onSubmit: (e) => addMember(e).catch((x) => setStatus(x.message)), key: "members" }, [
              React.createElement("h3", { key: "h" }, "Membership"),
              React.createElement(
                "select",
                { key: "s1", name: "user_id" },
                users.map((u) => React.createElement("option", { key: u.id, value: u.id }, u.display_name))
              ),
              React.createElement(
                "select",
                { key: "s2", name: "role" },
                [
                  React.createElement("option", { key: "editor", value: "editor" }, "editor"),
                  React.createElement("option", { key: "viewer", value: "viewer" }, "viewer")
                ]
              ),
              React.createElement("button", { key: "b1", type: "submit", disabled: !selectedCircle }, "Add/Update Member"),
              React.createElement("div", { className: "list", key: "list" }, members.map((m) => {
                const user = users.find((u) => u.id === m.user_id);
                return React.createElement("div", { className: "item", key: `${m.circle_id}-${m.user_id}` }, [
                  React.createElement("span", { key: "name" }, user ? user.display_name : m.user_id.slice(0, 8)),
                  React.createElement("span", { key: "role", className: "pill" }, m.role),
                ]);
              }))
            ]),
          ]),
          React.createElement("div", { className: "grid", key: "mid-grid" }, [
            React.createElement("form", { className: "card", onSubmit: (e) => addPerson(e).catch((x) => setStatus(x.message)), key: "people" }, [
              React.createElement("h3", { key: "h" }, "People"),
              React.createElement("input", { key: "i1", name: "full_name", required: true, placeholder: "Full name" }),
              React.createElement("input", { key: "i2", name: "religion", placeholder: "Religion" }),
              React.createElement("button", { key: "b1", type: "submit", disabled: !selectedCircle }, "Add Person"),
              React.createElement("div", { className: "list", key: "list" }, persons.map((p) =>
                React.createElement("div", { className: "item", key: p.id }, `${p.full_name} (${p.religion || "N/A"})`)
              )),
            ]),
            React.createElement("form", { className: "card", onSubmit: (e) => addRelationship(e).catch((x) => setStatus(x.message)), key: "rels" }, [
              React.createElement("h3", { key: "h" }, "Relationships"),
              React.createElement(
                "select",
                { key: "s1", name: "from_person_id" },
                personOptions.map((p) => React.createElement("option", { key: p.value, value: p.value }, p.label))
              ),
              React.createElement(
                "select",
                { key: "s2", name: "to_person_id" },
                personOptions.map((p) => React.createElement("option", { key: p.value, value: p.value }, p.label))
              ),
              React.createElement("input", { key: "i1", name: "relationship_type", required: true, placeholder: "parent_of" }),
              React.createElement("button", { key: "b1", type: "submit", disabled: personOptions.length < 2 }, "Add Relationship"),
              React.createElement("div", { className: "list", key: "list" }, relationships.map((r) =>
                React.createElement("div", { className: "item", key: r.id }, `${r.relationship_type} ${r.from_person_id.slice(0,6)} -> ${r.to_person_id.slice(0,6)}`)
              )),
            ]),
            React.createElement("form", { className: "card", onSubmit: (e) => loadSubgraph(e).catch((x) => setStatus(x.message)), key: "subgraph-form" }, [
              React.createElement("h3", { key: "h" }, "Subgraph Query"),
              React.createElement(
                "select",
                { key: "s1", name: "root_person_id" },
                personOptions.map((p) => React.createElement("option", { key: p.value, value: p.value }, p.label))
              ),
              React.createElement(
                "select",
                { key: "s2", name: "direction" },
                [
                  React.createElement("option", { key: "desc", value: "descendants" }, "descendants"),
                  React.createElement("option", { key: "anc", value: "ancestors" }, "ancestors")
                ]
              ),
              React.createElement("input", { key: "i1", type: "number", name: "depth", min: 1, max: 10, defaultValue: 2 }),
              React.createElement("button", { key: "b1", type: "submit", disabled: personOptions.length === 0 }, "Load Subgraph"),
              React.createElement("div", { className: "muted", key: "m1" }, subgraph ? `${subgraph.persons.length} nodes, ${subgraph.relationships.length} edges` : "No subgraph loaded"),
            ]),
          ]),
          React.createElement("div", { className: "grid", key: "bottom-grid" }, [
            React.createElement("form", { className: "card", onSubmit: (e) => createChangeRequest(e).catch((x) => setStatus(x.message)), key: "cr" }, [
              React.createElement("h3", { key: "h" }, "Change Requests"),
              React.createElement(
                "select",
                { key: "s1", name: "entity_id" },
                personOptions.map((p) => React.createElement("option", { key: p.value, value: p.value }, p.label))
              ),
              React.createElement("input", { key: "i1", name: "religion", placeholder: "Proposed religion value" }),
              React.createElement("button", { key: "b1", type: "submit", disabled: personOptions.length === 0 }, "Propose Change"),
              React.createElement("div", { className: "list", key: "list" }, changeRequests.map((cr) =>
                React.createElement("div", { className: "item", key: cr.id }, [
                  React.createElement("div", { key: "s" }, `Status: ${cr.status}`),
                  React.createElement("div", { className: "muted", key: "p" }, cr.proposed_patch_json),
                  cr.status === "pending"
                    ? React.createElement("div", { key: "actions" }, [
                        React.createElement("button", { key: "a", type: "button", onClick: () => reviewRequest(cr.id, "approve").catch((x) => setStatus(x.message)) }, "Approve"),
                        React.createElement("button", { key: "r", className: "secondary", type: "button", onClick: () => reviewRequest(cr.id, "reject").catch((x) => setStatus(x.message)) }, "Reject"),
                      ])
                    : null
                ])
              ))
            ]),
            React.createElement("div", { className: "card", key: "graph-view" }, [
              React.createElement("h3", { key: "h" }, "Graph Visualization"),
              React.createElement("div", { className: "muted", key: "m" }, "Directed subgraph from selected root"),
              React.createElement(GraphView, { key: "g", subgraph, rootPersonId: lastRoot }),
            ]),
            React.createElement("form", { className: "card", onSubmit: (e) => createContextEvent(e).catch((x) => setStatus(x.message)), key: "context-events" }, [
              React.createElement("h3", { key: "h" }, "Context Events"),
              React.createElement("input", { key: "d", name: "date", type: "date", required: true }),
              React.createElement("input", { key: "t", name: "title", required: true, placeholder: "Event title" }),
              React.createElement(
                "select",
                { key: "et", name: "event_type" },
                [
                  React.createElement("option", { key: "world", value: "world" }, "world"),
                  React.createElement("option", { key: "political", value: "political" }, "political"),
                  React.createElement("option", { key: "social", value: "social" }, "social"),
                  React.createElement("option", { key: "technology", value: "technology" }, "technology"),
                  React.createElement("option", { key: "family", value: "family" }, "family"),
                ]
              ),
              React.createElement("input", { key: "loc", name: "location_name", placeholder: "Location" }),
              React.createElement("input", { key: "desc", name: "description", placeholder: "Description" }),
