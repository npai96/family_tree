<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Viraasat | Family Chronicle</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300..800;1,6..72,300..800&family=Manrope:wght@300..800&display=swap"
    />
    <style>
      :root {
        --surface: #fbf9f5;
        --surface-low: #f5f3ef;
        --surface-high: #eae8e4;
        --surface-card: #ffffff;
        --outline: rgba(196, 198, 205, 0.24);
        --ink: #1b1c1a;
        --muted: #5f6978;
        --primary: #111a77;
        --primary-container: #2b348d;
        --secondary: #a04100;
        --secondary-fixed: #ffdbcc;
        --accent: #1f6d70;
        --accent-soft: #d7e9e4;
        --graph-edge: #8ca4b7;
        --graph-highlight: #b56d22;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Manrope", "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(1200px 600px at -10% -10%, rgba(255, 219, 204, 0.45), transparent 60%),
          radial-gradient(1000px 500px at 110% -20%, rgba(189, 194, 255, 0.30), transparent 60%),
          var(--surface);
      }
      .topbar {
        position: sticky;
        top: 0;
        z-index: 30;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        padding: 12px 16px;
        background: rgba(251, 249, 245, 0.72);
        backdrop-filter: blur(16px);
        box-shadow: 0 10px 28px rgba(27, 28, 26, 0.05);
      }
      .title {
        font-family: "Newsreader", Georgia, serif;
        color: var(--primary);
        font-size: 34px;
        font-weight: 700;
        line-height: 1;
        letter-spacing: -0.02em;
      }
      .subtitle {
        font-size: 12px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--muted);
      }
      .btn {
        border: 1px solid var(--outline);
        background: rgba(255, 255, 255, 0.82);
        color: #33404d;
        border-radius: 999px;
        padding: 8px 12px;
        cursor: pointer;
        font-size: 12px;
        font-weight: 700;
      }
      .btn:hover {
        background: #fff;
      }
      .shell {
        height: calc(100vh - 62px);
        display: grid;
        gap: 12px;
        padding: 12px;
      }
      .sidebar {
        background: rgba(245, 243, 239, 0.96);
        border: 1px solid var(--outline);
        border-radius: 20px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        box-shadow: 0 14px 34px rgba(27, 28, 26, 0.05);
      }
      .sidebar-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 14px;
        font-family: "Newsreader", Georgia, serif;
        color: var(--primary);
        font-size: 22px;
      }
      .sidebar-body {
        overflow: auto;
        padding: 10px 12px 14px;
      }
      .collapsed {
        align-items: center;
        justify-content: center;
      }
      .collapsed .sidebar-body,
      .collapsed .sidebar-head span {
        display: none;
      }
      .card {
        border: 1px solid var(--outline);
        border-radius: 18px;
        padding: 10px;
        margin-bottom: 12px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 8px 24px rgba(27, 28, 26, 0.04);
      }
      details.card summary {
        cursor: pointer;
        font-family: "Newsreader", Georgia, serif;
        color: #22303f;
        font-size: 17px;
        font-weight: 650;
        margin-bottom: 10px;
      }
      details.card[open] summary {
        margin-bottom: 12px;
      }
      label {
        display: block;
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 4px;
      }
      input, select, textarea {
        width: 100%;
        padding: 10px 12px;
        border-radius: 16px;
        border: 1px solid transparent;
        margin-bottom: 8px;
        background: var(--surface-high);
        font-family: "Manrope", sans-serif;
        color: #263445;
        font-size: 14px;
      }
      input:focus, select:focus, textarea:focus {
        outline: none;
        box-shadow: inset 0 -2px 0 rgba(255, 222, 160, 0.9);
      }
      button {
        background: linear-gradient(135deg, var(--primary) 0%, var(--primary-container) 100%);
        color: #fff;
        border: none;
        font-weight: 700;
        cursor: pointer;
        transition: transform 120ms ease, opacity 180ms ease;
      }
      form button {
        width: 100%;
        padding: 10px 12px;
        border-radius: 16px;
        margin-bottom: 8px;
      }
      button:hover { opacity: 0.95; }
      button:active { transform: translateY(1px); }
      textarea {
        width: 100%;
        min-height: 72px;
        border-radius: 16px;
        border: 1px solid transparent;
        background: var(--surface-high);
        padding: 10px 12px;
        margin-bottom: 8px;
        resize: vertical;
        font-family: "Manrope", sans-serif;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .ghost {
        background: #5b697a;
      }
      .muted { color: var(--muted); font-size: 12px; }
      .list {
        max-height: 180px;
        overflow: auto;
        border: 1px dashed var(--outline);
        border-radius: 14px;
        padding: 8px;
        font-size: 13px;
        background: rgba(255, 255, 255, 0.75);
      }
      .item { padding: 8px 0; border-bottom: 1px dotted rgba(196, 198, 205, 0.5); }
      .item:last-child { border-bottom: none; }
      .pill {
        display: inline-block;
        padding: 3px 10px;
        border-radius: 999px;
        background: var(--secondary-fixed);
        color: #7a3000;
        font-size: 11px;
        margin-left: 6px;
      }
      a {
        color: var(--secondary);
        font-weight: 700;
      }
      .graph-wrap {
        border: 1px solid var(--outline);
        border-radius: 24px;
        background:
          radial-gradient(900px 420px at 85% -20%, rgba(224, 224, 255, 0.48), transparent 70%),
          linear-gradient(180deg, #fff, #faf8f4);
        position: relative;
        overflow: hidden;
        box-shadow: 0 24px 48px rgba(27, 28, 26, 0.05);
      }
      .status-badge {
        position: absolute;
        top: 10px;
        left: 10px;
        z-index: 10;
        font-size: 15px;
        color: #1b5156;
        background: rgba(215, 233, 228, 0.9);
        border: 1px solid rgba(144, 188, 177, 0.7);
        border-radius: 999px;
        padding: 8px 14px;
      }
      .graph-scroll {
        height: 100%;
        overflow: auto;
      }
      .d3-graph-canvas {
        display: block;
        min-width: 100%;
      }
      .timeline-dot {
        display: inline-block;
        width: 9px;
        height: 9px;
        border-radius: 999px;
        margin-right: 6px;
      }
      .lineage-journey {
        margin: 10px 12px 0;
        padding: 16px 18px;
        border-radius: 18px;
        border: 1px solid var(--outline);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(245, 243, 239, 0.78));
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
      }
      .lineage-journey-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
      }
      .lineage-journey-title {
        font-family: "Newsreader", Georgia, serif;
        font-size: 26px;
        color: var(--primary);
      }
      .lineage-journey-subtitle {
        color: var(--muted);
        font-style: italic;
        font-size: 13px;
        margin-bottom: 16px;
      }
      .lineage-journey-rail {
        position: relative;
        display: grid;
        gap: 18px;
      }
      .lineage-journey-rail::before {
        content: "";
        position: absolute;
        left: 50%;
        top: 0;
        bottom: 0;
        width: 1px;
        background: rgba(196, 198, 205, 0.7);
        transform: translateX(-50%);
      }
      .journey-row {
        display: grid;
        grid-template-columns: 1fr 40px 1fr;
        gap: 10px;
        align-items: center;
      }
      .journey-row.flip .journey-person {
        grid-column: 3;
      }
      .journey-row.flip .journey-context {
        grid-column: 1;
        text-align: right;
      }
      .journey-center {
        display: flex;
        justify-content: center;
      }
      .journey-dot {
        width: 12px;
        height: 12px;
        border-radius: 999px;
        background: var(--secondary);
        border: 3px solid rgba(255, 255, 255, 0.95);
        box-shadow: 0 0 0 1px rgba(196, 198, 205, 0.6);
      }
      .journey-person-card {
        width: 100%;
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid var(--outline);
        border-radius: 14px;
        padding: 12px;
        margin-bottom: 0;
        text-align: left;
        box-shadow: 0 14px 30px rgba(27, 28, 26, 0.06);
      }
      .journey-person-head {
        display: flex;
        justify-content: space-between;
        gap: 8px;
      }
      .lineage-name {
        font-family: "Newsreader", Georgia, serif;
        font-size: 24px;
        color: #20304a;
        line-height: 1.1;
      }
      .lineage-years {
        color: var(--secondary);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.03em;
      }
      .lineage-link {
        align-self: center;
        min-width: 28px;
        height: 2px;
        background: rgba(160, 65, 0, 0.45);
      }
      .journey-chip {
        align-self: start;
        display: inline-block;
        border-radius: 999px;
        padding: 3px 8px;
        background: var(--secondary-fixed);
        color: #7a3000;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.04em;
      }
      .journey-context {
        color: #6a7888;
        font-size: 12px;
      }
      .journey-context-label {
        font-size: 10px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #9aa3ad;
        margin-bottom: 5px;
      }
      .migration-panel {
        display: grid;
        gap: 8px;
        padding: 10px;
        border-radius: 14px;
        border: 1px solid var(--outline);
        background: rgba(255, 255, 255, 0.82);
      }
      .migration-map-frame {
        border: 1px solid var(--outline) !important;
        border-radius: 12px !important;
        margin-top: 8px;
        box-shadow: 0 10px 24px rgba(27, 28, 26, 0.06);
      }
      @media (max-width: 1100px) {
        .shell { grid-template-columns: 1fr !important; height: auto; }
        .sidebar { max-height: 380px; }
        .graph-wrap { height: 70vh; }
        .title { font-size: 28px; }
        .lineage-journey-rail::before { left: 16px; transform: none; }
        .journey-row { grid-template-columns: 32px 1fr; }
        .journey-person, .journey-context, .journey-row.flip .journey-person, .journey-row.flip .journey-context {
          grid-column: 2;
          text-align: left;
        }
        .journey-center { grid-column: 1; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/d3@7/dist/d3.min.js"></script>
    <script>
      const { useEffect, useMemo, useRef, useState } = React;
        const RELATIONSHIP_TYPES = [
          { value: "parent_of", label: "parent_of (A is parent of B)" },
          { value: "child_of", label: "child_of (A is child of B)" },
          { value: "spouse_of", label: "spouse_of (A and B are spouses)" },
          { value: "sibling_of", label: "sibling_of (A and B are siblings)" },
          { value: "aunt_uncle_of", label: "aunt_uncle_of (A is aunt/uncle of B)" },
          { value: "niece_nephew_of", label: "niece_nephew_of (A is niece/nephew of B)" },
          { value: "cousin_of", label: "cousin_of (A and B are cousins)" },
        ];

      function edgeKey(fromId, toId) {
        return `${fromId}->${toId}`;
      }

      function computeLayout(subgraph, rootPersonId) {
        const nodes = subgraph?.persons || [];
        const edges = subgraph?.relationships || [];
        if (!nodes.length) return { width: 1000, height: 600, pos: {}, nodes, edges };

        const outgoing = {};
        edges.forEach((e) => {
          if (!outgoing[e.from_person_id]) outgoing[e.from_person_id] = [];
          outgoing[e.from_person_id].push(e.to_person_id);
        });

        const level = {};
        if (rootPersonId) level[rootPersonId] = 0;
        const q = rootPersonId ? [[rootPersonId, 0]] : [];
        while (q.length) {
          const [id, depth] = q.shift();
          (outgoing[id] || []).forEach((nextId) => {
            if (level[nextId] === undefined) {
              level[nextId] = depth + 1;
              q.push([nextId, depth + 1]);
            }
          });
        }
        nodes.forEach((n) => { if (level[n.id] === undefined) level[n.id] = 0; });

        const groups = {};
        nodes.forEach((n) => {
          const d = level[n.id];
          if (!groups[d]) groups[d] = [];
          groups[d].push(n);
        });

        const cols = Object.keys(groups).map(Number).sort((a, b) => a - b);
        const pos = {};
        const colGap = 340;
        const rowGap = 210;
        cols.forEach((c) => {
          groups[c].forEach((node, i) => {
            pos[node.id] = { x: 170 + c * colGap, y: 100 + i * rowGap };
          });
        });

        const maxCol = cols.length ? Math.max(...cols) : 0;
        const maxRows = Math.max(1, ...Object.values(groups).map((g) => g.length));
        const width = 360 + (maxCol + 1) * colGap;
        const height = 260 + maxRows * rowGap;
        return { width, height, pos, nodes, edges };
      }

      function normalizeDisplayEdges(edges) {
        const undirectedTypes = new Set(["spouse_of", "sibling_of", "cousin_of", "partner_of"]);
        const displayEdgeMap = new Map();
        edges.forEach((edge) => {
          let fromId = edge.from_person_id;
          let toId = edge.to_person_id;
          let relType = edge.relationship_type;
          if (relType === "child_of") {
            fromId = edge.to_person_id;
            toId = edge.from_person_id;
            relType = "parent_of";
          } else if (relType === "niece_nephew_of") {
            fromId = edge.to_person_id;
            toId = edge.from_person_id;
            relType = "aunt_uncle_of";
          } else if (relType === "grandchild_of") {
            fromId = edge.to_person_id;
            toId = edge.from_person_id;
            relType = "grandparent_of";
          }
          if (undirectedTypes.has(relType) && fromId > toId) {
            fromId = edge.to_person_id;
            toId = edge.from_person_id;
          }
          const dedupeKey = `${fromId}|${toId}|${relType}`;
          if (!displayEdgeMap.has(dedupeKey)) {
            displayEdgeMap.set(dedupeKey, {
              id: dedupeKey,
              from_person_id: fromId,
              to_person_id: toId,
              relationship_type: relType,
            });
          }
        });
        return { undirectedTypes, displayEdges: Array.from(displayEdgeMap.values()) };
      }

      function GraphView({
        subgraph,
        rootPersonId,
        zoom,
        selectedNodeId,
        highlightedNodeIds,
        highlightedEdgeKeys,
        onNodeClick,
      }) {
        const svgRef = useRef(null);
        const transformRef = useRef(null);
        const hasData = Boolean(subgraph && subgraph.persons && subgraph.persons.length);
        const safeSubgraph = hasData ? subgraph : { persons: [], relationships: [] };
        const { width, height, pos, nodes, edges } = computeLayout(safeSubgraph, rootPersonId);
        const names = {};
        nodes.forEach((n) => { names[n.id] = n.full_name; });
        const { undirectedTypes, displayEdges } = normalizeDisplayEdges(edges);
        const NODE_W = 236;
        const NODE_H = 132;
        const NODE_HALF_W = NODE_W / 2;
        const NODE_HALF_H = NODE_H / 2;

        useEffect(() => {
          if (!hasData || !svgRef.current || typeof d3 === "undefined") return;
          const svg = d3.select(svgRef.current);
          svg.selectAll("*").remove();

          const stage = svg.append("g");
          const root = stage.append("g");

          const localPos = {};
          nodes.forEach((n) => {
            const base = pos[n.id] || { x: 170, y: 100 };
            localPos[n.id] = { x: base.x, y: base.y };
          });

          function drawGraph() {
            root.selectAll(".edge-layer,.node-layer").remove();
            const pairCounts = new Map();
            displayEdges.forEach((edge) => {
              const pairKey = undirectedTypes.has(edge.relationship_type)
                ? [edge.from_person_id, edge.to_person_id].sort().join("|")
                : `${edge.from_person_id}|${edge.to_person_id}`;
              pairCounts.set(pairKey, (pairCounts.get(pairKey) || 0) + 1);
            });
            const pairSeen = new Map();
            const directedIncomingCounts = new Map();
            const directedOutgoingCounts = new Map();
            displayEdges.forEach((edge) => {
              if (undirectedTypes.has(edge.relationship_type)) return;
              directedIncomingCounts.set(edge.to_person_id, (directedIncomingCounts.get(edge.to_person_id) || 0) + 1);
              directedOutgoingCounts.set(edge.from_person_id, (directedOutgoingCounts.get(edge.from_person_id) || 0) + 1);
            });
            const directedIncomingSeen = new Map();
            const directedOutgoingSeen = new Map();

            const edgeLayer = root.append("g").attr("class", "edge-layer");
            const nodeLayer = root.append("g").attr("class", "node-layer");

            displayEdges.forEach((edge) => {
              let fromId = edge.from_person_id;
              let toId = edge.to_person_id;
              let from = localPos[fromId];
              let to = localPos[toId];
              if (!from || !to) return;
              const isUndirected = undirectedTypes.has(edge.relationship_type);
              if (isUndirected && from.x > to.x) {
                fromId = edge.to_person_id;
                toId = edge.from_person_id;
                from = localPos[fromId];
                to = localPos[toId];
              }
              const pairKey = isUndirected ? [fromId, toId].sort().join("|") : `${fromId}|${toId}`;
              const seen = pairSeen.get(pairKey) || 0;
              pairSeen.set(pairKey, seen + 1);
              const count = pairCounts.get(
                isUndirected ? [edge.from_person_id, edge.to_person_id].sort().join("|") : `${edge.from_person_id}|${edge.to_person_id}`
              ) || 1;
              const laneOffset = (seen - (count - 1) / 2) * 14;
              let sourceSpread = 0;
              let targetSpread = 0;
              if (!isUndirected) {
                const outSeen = directedOutgoingSeen.get(fromId) || 0;
                directedOutgoingSeen.set(fromId, outSeen + 1);
                const outCount = directedOutgoingCounts.get(fromId) || 1;
                sourceSpread = (outSeen - (outCount - 1) / 2) * 10;
                const inSeen = directedIncomingSeen.get(toId) || 0;
                directedIncomingSeen.set(toId, inSeen + 1);
                const inCount = directedIncomingCounts.get(toId) || 1;
                targetSpread = (inSeen - (inCount - 1) / 2) * 10;
              }

              const deltaX = to.x - from.x;
              const deltaY = to.y - from.y;
              const isPrimarilyVertical = Math.abs(deltaY) > Math.abs(deltaX);
              let startX;
              let startY;
              let endX;
              let endY;
              let control1X;
              let control1Y;
              let control2X;
              let control2Y;
              if (isPrimarilyVertical) {
                const fromDown = to.y >= from.y;
                startX = from.x + laneOffset + sourceSpread;
                startY = from.y + (fromDown ? NODE_H : 0);
                endX = to.x + laneOffset + targetSpread;
                endY = to.y + (fromDown ? 0 : NODE_H);
                const controlDeltaY = Math.max(36, Math.abs(endY - startY) * 0.35);
                control1X = startX;
                control1Y = startY + (fromDown ? controlDeltaY : -controlDeltaY);
                control2X = endX;
                control2Y = endY - (fromDown ? controlDeltaY : -controlDeltaY);
              } else {
                const leftToRight = to.x >= from.x;
                startX = from.x + (leftToRight ? NODE_HALF_W : -NODE_HALF_W);
                startY = from.y + NODE_HALF_H + laneOffset + sourceSpread;
                endX = to.x + (leftToRight ? -NODE_HALF_W : NODE_HALF_W);
                endY = to.y + NODE_HALF_H + laneOffset + targetSpread;
                const horizontalSpan = Math.abs(endX - startX);
                if (horizontalSpan < 44) {
                  const bulge = 54 + Math.abs(laneOffset) * 1.2;
                  control1X = startX + (startX <= endX ? 18 : -18);
                  control1Y = startY - bulge;
                  control2X = endX + (startX <= endX ? -18 : 18);
                  control2Y = endY - bulge;
                } else {
                  const controlDeltaX = Math.max(44, horizontalSpan * 0.35);
                  control1X = startX + (startX <= endX ? controlDeltaX : -controlDeltaX);
                  control1Y = startY;
                  control2X = endX + (startX <= endX ? -controlDeltaX : controlDeltaX);
                  control2Y = endY;
                }
              }
              if (!isUndirected) {
                const vecX = endX - startX;
                const vecY = endY - startY;
                const len = Math.max(1, Math.hypot(vecX, vecY));
                const ux = vecX / len;
                const uy = vecY / len;
                const arrowGap = 11;
                endX -= ux * arrowGap;
                endY -= uy * arrowGap;
                control2X -= ux * (arrowGap * 0.8);
                control2Y -= uy * (arrowGap * 0.8);
              }
              const labelX = (startX + endX) / 2;
              const labelY = (startY + endY) / 2 - 9;
              const highlighted = (
                highlightedEdgeKeys.has(edgeKey(edge.from_person_id, edge.to_person_id)) ||
                highlightedEdgeKeys.has(edgeKey(edge.to_person_id, edge.from_person_id))
              );

              const edgeColor = highlighted ? "var(--graph-highlight)" : "var(--graph-edge)";
              edgeLayer
                .append("path")
                .attr("d", `M ${startX} ${startY} C ${control1X} ${control1Y}, ${control2X} ${control2Y}, ${endX} ${endY}`)
                .attr("fill", "none")
                .attr("stroke", edgeColor)
                .attr("stroke-width", highlighted ? 3.5 : 2)
                .attr("stroke-linecap", "round");

              if (!isUndirected) {
                const tanX = endX - control2X;
                const tanY = endY - control2Y;
                const tanLen = Math.max(1, Math.hypot(tanX, tanY));
                const ux = tanX / tanLen;
                const uy = tanY / tanLen;
                const px = -uy;
                const py = ux;
                const headLen = 11;
                const headWidth = 5;
                const baseX = endX - ux * headLen;
                const baseY = endY - uy * headLen;
                const leftX = baseX + px * headWidth;
                const leftY = baseY + py * headWidth;
                const rightX = baseX - px * headWidth;
                const rightY = baseY - py * headWidth;
                edgeLayer
                  .append("polygon")
                  .attr("points", `${endX},${endY} ${leftX},${leftY} ${rightX},${rightY}`)
                  .attr("fill", edgeColor)
                  .attr("stroke", edgeColor)
                  .attr("stroke-width", 0.8);
              }

              edgeLayer
                .append("text")
                .attr("x", labelX)
                .attr("y", labelY)
                .attr("text-anchor", "middle")
                .attr("font-size", 14)
                .attr("font-family", "Manrope, sans-serif")
                .attr("font-weight", 650)
                .attr("fill", highlighted ? "#9a5b1c" : "#607488")
                .text(edge.relationship_type);
            });

            nodes.forEach((node) => {
              const p = localPos[node.id];
              if (!p) return;
              const isRoot = node.id === rootPersonId;
              const isSelected = node.id === selectedNodeId;
              const isHighlighted = highlightedNodeIds.has(node.id);
              const fill = isRoot ? "var(--accent)" : isSelected ? "#fde7c4" : isHighlighted ? "#f8eee1" : "#ffffff";

              const textColor = isRoot ? "#ffffff" : "#2b3641";

              const name = names[node.id] || node.id.slice(0, 8);

              const years = `${node.birth_date || "?"} — ${node.death_date || "present"}`;

              const g = nodeLayer.append("g").style("cursor", "pointer").datum(node);

                .attr("height", NODE_H)

                .attr("fill", fill)

                .attr("stroke-width", isSelected ? 3 : 2);
              g.append("rect")
                .attr("x", p.x - NODE_HALF_W + 12)
                .attr("y", p.y + 14)
                .attr("width", 56)
                .attr("height", 74)
                .attr("rx", 8)
                .attr("fill", isRoot ? "rgba(255,255,255,0.2)" : "#d5d2cc")
                .attr("stroke", isRoot ? "rgba(255,255,255,0.35)" : "#c4c6cd")
                .attr("stroke-width", 1);
              g.append("text")
                .attr("x", p.x - NODE_HALF_W + 40)
                .attr("y", p.y + 58)
                .attr("text-anchor", "middle")
                .attr("font-size", 11)
                .attr("font-family", "Manrope, sans-serif")
                .attr("font-weight", 700)
                .attr("fill", isRoot ? "rgba(255,255,255,0.88)" : "#5c6a79")
                .text("Portrait");
              g.append("text")
                .attr("x", p.x - NODE_HALF_W + 80)
                .attr("y", p.y + 36)
                .attr("text-anchor", "start")
                .attr("font-size", 29)
                .attr("font-family", "Newsreader, Georgia, serif")
                .attr("font-weight", 700)
                .attr("fill", textColor)
                .text(line1);
              if (line2) {
                g.append("text")
                  .attr("x", p.x - NODE_HALF_W + 80)
                  .attr("y", p.y + 62)
                  .attr("text-anchor", "start")
                  .attr("font-size", 24)
                  .attr("font-family", "Newsreader, Georgia, serif")
                  .attr("font-weight", 600)
                  .attr("fill", textColor)
                  .text(line2);
              }
              g.append("text")
                .attr("x", p.x - NODE_HALF_W + 80)
                .attr("y", p.y + 84)
                .attr("text-anchor", "start")
                .attr("font-size", 12)
                .attr("font-family", "Manrope, sans-serif")
                .attr("font-weight", 700)
                .attr("fill", subtitleColor)

              g.append("text")
                .attr("x", p.x - NODE_HALF_W + 80)
                .attr("y", p.y + 104)
                .attr("text-anchor", "start")
                .attr("font-size", 11)
                .attr("font-family", "Manrope, sans-serif")
                .attr("fill", subtitleColor)
                .text((node.birth_place || "Birthplace unknown").slice(0, 30));
              const badgeW = Math.max(48, Math.min(96, badge.length * 6 + 16));
              g.append("rect")
                .attr("x", p.x + NODE_HALF_W - badgeW - 12)
                .attr("y", p.y + 12)
                .attr("width", badgeW)
                .attr("height", 18)
                .attr("rx", 10)
                .attr("fill", isRoot ? "rgba(255, 219, 204, 0.25)" : "rgba(255, 219, 204, 0.75)");
              g.append("text")
                .attr("x", p.x + NODE_HALF_W - badgeW / 2 - 12)
                .attr("y", p.y + 25)
                .attr("text-anchor", "middle")
                .attr("font-size", 10)
                .attr("font-family", "Manrope, sans-serif")
                .attr("font-weight", 700)
                .attr("fill", isRoot ? "rgba(255,255,255,0.9)" : "#7a3000")
                .text(badge);
              g.on("click", () => onNodeClick(node.id));
            });
          }

          const zoomBehavior = d3.zoom()
            .scaleExtent([0.35, 2.4])
            .on("zoom", (event) => {
              transformRef.current = event.transform;
              stage.attr("transform", event.transform);
            });
          svg.call(zoomBehavior);

          const startingTransform = transformRef.current
            ? d3.zoomIdentity.translate(transformRef.current.x, transformRef.current.y).scale(zoom)
            : d3.zoomIdentity.scale(zoom);
          svg.call(zoomBehavior.transform, startingTransform);

          drawGraph();
        }, [displayEdges, hasData, highlightedEdgeKeys, highlightedNodeIds, names, nodes, onNodeClick, pos, rootPersonId, selectedNodeId, undirectedTypes, width, height, zoom]);

        if (!hasData) {
          return React.createElement("div", { className: "muted", style: { padding: "14px" } }, "Load a subgraph to begin exploration.");
        }

        return React.createElement("svg", {
          ref: svgRef,
          className: "d3-graph-canvas",
          width: Math.ceil(width * zoom),
          height: Math.ceil(height * zoom),
        });
      }

      function App() {
        const [users, setUsers] = useState([]);

        const [discussionThreadId, setDiscussionThreadId] = useState("");
        const [discussionMessages, setDiscussionMessages] = useState([]);
        const [personRevisions, setPersonRevisions] = useState([]);
        const [duplicateHints, setDuplicateHints] = useState([]);
        const [subgraph, setSubgraph] = useState(null);
        const [lastRoot, setLastRoot] = useState("");
        const [lastDirection, setLastDirection] = useState("descendants");
        const [lastDepth, setLastDepth] = useState(2);
        const [lastMode, setLastMode] = useState("lineage");
        const [lastLateralTypes, setLastLateralTypes] = useState("spouse_of,sibling_of,cousin_of");
        const [lastLateralDepth, setLastLateralDepth] = useState(1);
        const [status, setStatus] = useState("");
        const [leftOpen, setLeftOpen] = useState(true);

        const headers = useMemo(() => {
          if (authToken) return { "Content-Type": "application/json", Authorization: `Bearer ${authToken}` };
          if (activeUserId) return { "Content-Type": "application/json", "X-User-Id": activeUserId };

        const personOptions = useMemo(() => persons.map((p) => ({ value: p.id, label: p.full_name })), [persons]);
        const userOptions = useMemo(
          () => users.map((u) => ({ value: u.id, label: `${u.display_name} (${u.id.slice(0, 8)})` })),
          [users]
        );
        const activeUserName = useMemo(() => users.find((u) => u.id === activeUserId)?.display_name || "", [users, activeUserId]);
        const activeMembership = useMemo(
          () => members.find((m) => m.user_id === activeUserId) || null,

        );
        const activeCircleRole = activeMembership ? activeMembership.role : null;

        const selectedPerson = useMemo(
          () => persons.find((p) => p.id === selectedPersonId) || (subgraph?.persons || []).find((p) => p.id === selectedPersonId) || null,
          [persons, subgraph, selectedPersonId]
        );
        const highlightedNodeSet = useMemo(() => new Set(highlightedNodeIds), [highlightedNodeIds]);
        const highlightedEdgeSet = useMemo(() => new Set(highlightedEdgeKeys), [highlightedEdgeKeys]);
        const subgraphMigrationView = useMemo(() => {
          const features = (subgraphMigrationGeoJson && subgraphMigrationGeoJson.features) || [];
          const points = features.filter((f) => f.geometry && f.geometry.type === "Point");
          const lines = features.filter((f) => f.geometry && f.geometry.type === "LineString");
          if (!points.length && !lines.length) {
            return { points: [], lines: [], width: 560, height: 240 };
          }
          const allCoords = [];
          points.forEach((f) => {
            if (Array.isArray(f.geometry.coordinates)) allCoords.push(f.geometry.coordinates);
          });
          lines.forEach((f) => {
            if (Array.isArray(f.geometry.coordinates)) {
              f.geometry.coordinates.forEach((c) => allCoords.push(c));
            }
          });
          const lngs = allCoords.map((c) => Number(c[0]));
          const lats = allCoords.map((c) => Number(c[1]));
          const minLng = Math.min(...lngs);
          const maxLng = Math.max(...lngs);
          const minLat = Math.min(...lats);
          const maxLat = Math.max(...lats);
          const width = 560;
          const height = 240;
          const pad = 20;
          const spanLng = Math.max(0.0001, maxLng - minLng);
          const spanLat = Math.max(0.0001, maxLat - minLat);
          function project(coord) {
            const x = pad + ((Number(coord[0]) - minLng) / spanLng) * (width - pad * 2);
            const y = pad + (1 - ((Number(coord[1]) - minLat) / spanLat)) * (height - pad * 2);
            return [x, y];
          }
          const projectedPoints = points.map((f, i) => {
            const [x, y] = project(f.geometry.coordinates);
            return {
              key: `p-${i}`,
              x,
              y,
              label: (f.properties && (f.properties.place_name || f.properties.full_name)) || "Place",
              fromDate: (f.properties && f.properties.from_date) || "",
              personName: (f.properties && f.properties.full_name) || "",
            };
          });
          const projectedLines = lines.map((f, i) => {
            const coords = (f.geometry.coordinates || []).map(project);
            return {
              key: `l-${i}`,
              d: coords.length ? `M ${coords.map((c) => `${c[0]} ${c[1]}`).join(" L ")}` : "",
              label: (f.properties && f.properties.full_name) || "Route",
            };
          }).filter((l) => l.d);
          return { points: projectedPoints, lines: projectedLines, width, height };
        }, [subgraphMigrationGeoJson]);
        const lineageJourneyItems = useMemo(() => {
          const rows = (subgraph?.persons || []).map((p) => ({
            id: p.id,
            name: p.full_name || p.id.slice(0, 8),
            birthDate: p.birth_date || "",
            deathDate: p.death_date || "",
            birthPlace: p.birth_place || "",
            badge: p.occupation || p.religion || "Ancestor",
            worldEvents: (contextEvents || [])
              .filter((evt) => {
                const year = (p.birth_date || p.death_date || "").slice(0, 4);
                return year && (evt.date || "").startsWith(year);
              })
              .slice(0, 2)
              .map((evt) => evt.title),
            sortDate: p.birth_date || p.death_date || "9999-12-31",
          }));
          rows.sort((a, b) => a.sortDate.localeCompare(b.sortDate) || a.name.localeCompare(b.name));
          return rows.slice(0, 12);
        }, [subgraph, contextEvents]);

        function setActiveUser(id) {
          if (id !== activeUserId && authToken) {
            setToken("");
            setStatus("Signed out due to user switch. Sign in again for the selected user.");
          }
          setActiveUserId(id);
          localStorage.setItem("activeUserId", id || "");
        }

        function setToken(token) {
          setAuthToken(token || "");
          if (token) localStorage.setItem("authToken", token);
          else localStorage.removeItem("authToken");
        }

        async function requestJson(url, options = {}) {
          const res = await fetch(url, options);
          if (!res.ok) {
            const body = await res.json().catch(() => ({ detail: "Request failed" }));
            throw new Error(body.detail || "Request failed");
          }
          return res.json();
        }

        function findPathFromRoot(targetId) {
          if (!subgraph || !lastRoot || !targetId) return { nodes: [], edges: [] };
          const prev = {};
          const q = [lastRoot];
          const visited = new Set([lastRoot]);
          while (q.length) {
            const cur = q.shift();
            if (cur === targetId) break;
            (subgraph.relationships || []).forEach((edge) => {
              if (edge.from_person_id === cur && !visited.has(edge.to_person_id)) {
                visited.add(edge.to_person_id);
                prev[edge.to_person_id] = cur;
                q.push(edge.to_person_id);
              }
            });
          }
          if (!visited.has(targetId)) return { nodes: [targetId], edges: [] };
          const nodes = [];
          const edges = [];
          let cur = targetId;
          while (cur !== undefined) {
            nodes.push(cur);
            const parent = prev[cur];
            if (parent !== undefined) {
              edges.push(edgeKey(parent, cur));
            }
            cur = parent;
          }
          return { nodes: nodes.reverse(), edges: edges.reverse() };
        }

        function applyPersonFocus(personId) {
          setSelectedPersonId(personId);
          const path = findPathFromRoot(personId);
          setHighlightedNodeIds(path.nodes.length ? path.nodes : [personId]);
          setHighlightedEdgeKeys(path.edges);
        }

        function fitGraph() {
          const el = graphViewportRef.current;
          if (!el || !graphSize.width || !graphSize.height) return;
          const pad = 60;
          const nextZoom = Math.max(0.4, Math.min(1.8, Math.min((el.clientWidth - pad) / graphSize.width, (el.clientHeight - pad) / graphSize.height)));
          setZoom(nextZoom);
          el.scrollTop = 0;
          el.scrollLeft = 0;
        }

        async function loadUsers() {
          const data = await requestJson("/users");
          setUsers(data);

            headers: { "Content-Type": "application/json" },

          if (data.user && data.user.id && data.user.id !== activeUserId) {
            setActiveUserId(data.user.id);
            localStorage.setItem("activeUserId", data.user.id);
          }
          setToken(data.access_token);
          setStatus("Signed in");
        }

        async function loadCircles() {
          if (!activeUserId && !authToken) return setCircles([]);
          const data = await requestJson("/circles", { headers });
          setCircles(data);
          if (!data.length) return setSelectedCircle("");
          const exists = data.some((c) => c.id === selectedCircle);
          if (!selectedCircle || !exists) setSelectedCircle(data[0].id);
        }

        async function loadCircleData(circleId) {
          if ((!activeUserId && !authToken) || !circleId) {
            setMembers([]); setPersons([]); setRelationships([]); setChangeRequests([]); setContextEvents([]); setTimeline([]);
            return;
          }
          const [m, p, r, cr, ce] = await Promise.all([
            requestJson(`/circles/${circleId}/members`, { headers }),
            requestJson(`/circles/${circleId}/persons`, { headers }),
            requestJson(`/circles/${circleId}/relationships`, { headers }),
            requestJson(`/circles/${circleId}/change-requests`, { headers }),
            requestJson(`/circles/${circleId}/context-events`, { headers }),
          ]);
          setMembers(m); setPersons(p); setRelationships(r); setChangeRequests(cr); setContextEvents(ce);
        }

          if (!activeUserId || !circleId) {
            setCircleInvitations([]);
            setAuditLogs([]);

          const [invitesResult, auditResult] = await Promise.allSettled([
            requestJson(`/circles/${circleId}/invitations`, { headers }),
            requestJson(`/circles/${circleId}/audit-logs?limit=60`, { headers }),

          setCircleInvitations(invitesResult.status === "fulfilled" ? invitesResult.value : []);

            { headers }
          );
          setDuplicateHints(hints);
          await requestJson(`/circles/${selectedCircle}/persons`, {

            headers,
            body: JSON.stringify({
              full_name,
              religion: e.target.religion.value.trim() || null,
              birth_date,

                                strokeWidth: 1.4,
                              }),
                              React.createElement("text", {
                                key: "t",
                                x: pt.x + 7,
                                y: pt.y - 7,
                                fontSize: 10,
                                fill: "#345",
                              }, `${pt.label}${pt.fromDate ? ` (${pt.fromDate})` : ""}`),
                            ])
                          ),
                        ]),
                      ])
                    : null,
                  migrationGeoJson
                    ? React.createElement(
                        "a",
                        {
                          key: "geo",
                          href: `data:application/json;charset=utf-8,${encodeURIComponent(JSON.stringify(migrationGeoJson, null, 2))}`,
                          download: `migration_${selectedPersonId || "person"}.geojson`,
                        },
                        "Download Selected Person GeoJSON"
                      )
                    : null,
                  React.createElement("div", { className: "list", key: "l" },
                    personPlaces.map((pl) =>
                      React.createElement("div", { className: "item", key: pl.id }, [
                        React.createElement("div", { key: "t" }, `${pl.place_name}${pl.country ? `, ${pl.country}` : ""}`),
                        React.createElement("div", { className: "muted", key: "d" }, `${pl.from_date || "?"} -> ${pl.to_date || "?"}`),
                        React.createElement("button", { key: "v", type: "button", className: "btn", onClick: () => setSelectedPlace(pl) }, "View Map"),
                      ])
                    )
                  ),
                  selectedPlace
                    ? React.createElement(
                        "iframe",
                        {
                          key: "map",
                          title: "Place map",
                          width: "100%",
                          height: "220",
                          style: { border: "1px solid #d7cfc2", borderRadius: "8px", marginTop: "8px" },
                          loading: "lazy",
                          src: selectedPlace.lat != null && selectedPlace.lng != null
                            ? `https://maps.google.com/maps?q=${selectedPlace.lat},${selectedPlace.lng}&z=6&output=embed`
                            : `https://maps.google.com/maps?q=${encodeURIComponent(selectedPlace.place_name)}&z=6&output=embed`,
                          className: "migration-map-frame",
                        }
                      )
                    : null,
                ]),
                React.createElement("details", { className: "card", key: "cr" }, [
                  React.createElement("summary", { key: "s" }, "Change Requests"),
                  React.createElement("form", { key: "f", onSubmit: (e) => createChangeRequest(e).catch((x) => setStatus(x.message)) }, [
                    React.createElement("select", { key: "p", name: "entity_id" }, personOptions.map((p) => React.createElement("option", { key: p.value, value: p.value }, p.label))),
                    React.createElement("input", { key: "r", name: "religion", placeholder: "Proposed religion value" }),
                    React.createElement("button", { key: "b", type: "submit", disabled: personOptions.length === 0 }, "Propose"),
                  ]),
                  React.createElement("div", { className: "list", key: "l" },
                    changeRequests.map((cr) => React.createElement("div", { className: "item", key: cr.id }, [
                      React.createElement("div", { key: "s" }, `Status: ${cr.status}`),
                      React.createElement("div", { className: "muted", key: "p" }, cr.proposed_patch_json),
                      cr.status === "pending" ? React.createElement("div", { key: "a", style: { marginTop: "6px" } }, [
                        React.createElement("button", { key: "ap", type: "button", onClick: () => reviewRequest(cr.id, "approve").catch((x) => setStatus(x.message)), disabled: !canEditRecords }, "Approve"),
                        React.createElement("button", { key: "rj", type: "button", className: "ghost", onClick: () => reviewRequest(cr.id, "reject").catch((x) => setStatus(x.message)), disabled: !canEditRecords }, "Reject"),
                      ]) : null
                    ]))
                  ),
                ]),
                React.createElement("details", { className: "card", key: "ctx" }, [
                  React.createElement("summary", { key: "s" }, "Context Events"),
                  React.createElement("form", { key: "f", onSubmit: (e) => createContextEvent(e).catch((x) => setStatus(x.message)) }, [
                    React.createElement("input", { key: "d", type: "date", name: "date", required: true }),
                    React.createElement("input", { key: "t", name: "title", required: true, placeholder: "Event title" }),
                    React.createElement("select", { key: "e", name: "event_type" }, [
                      React.createElement("option", { key: "w", value: "world" }, "world"),
                      React.createElement("option", { key: "p", value: "political" }, "political"),
                      React.createElement("option", { key: "s", value: "social" }, "social"),
                      React.createElement("option", { key: "t", value: "technology" }, "technology"),
                      React.createElement("option", { key: "f", value: "family" }, "family"),
                    ]),
                    React.createElement("input", { key: "l", name: "location_name", placeholder: "Location" }),
                    React.createElement("input", { key: "x", name: "description", placeholder: "Description" }),
                    React.createElement("button", { key: "b", type: "submit", disabled: !selectedCircle || !canEditRecords }, "Add Event"),
                  ]),
                  React.createElement("form", { key: "lnk", onSubmit: (e) => linkEventToPerson(e).catch((x) => setStatus(x.message)) }, [
                    React.createElement("select", { key: "p1", name: "person_id" }, personOptions.map((p) => React.createElement("option", { key: p.value, value: p.value }, p.label))),
                    React.createElement("select", { key: "e1", name: "context_event_id" }, contextEvents.map((e) => React.createElement("option", { key: e.id, value: e.id }, `${e.date} ${e.title}`))),
                    React.createElement("input", { key: "rn", name: "relevance_note", placeholder: "Relevance note" }),
                    React.createElement("button", { key: "b2", type: "submit", disabled: personOptions.length === 0 || contextEvents.length === 0 || !canEditRecords }, "Link Event"),
                  ]),
                  React.createElement("div", { className: "list", key: "lst" },
                    contextEvents.map((e) => React.createElement("div", { className: "item", key: e.id }, `${e.date} • ${e.title}`))
                  ),
                ]),
                React.createElement("details", { className: "card", key: "tl" }, [
                  React.createElement("summary", { key: "s" }, "Timeline"),
                  React.createElement("form", { key: "f", onSubmit: (e) => loadTimeline(e).catch((x) => setStatus(x.message)) }, [
                    React.createElement("select", { key: "p", name: "person_id" }, personOptions.map((p) => React.createElement("option", { key: p.value, value: p.value }, p.label))),
                    React.createElement("select", { key: "scope", value: timelineScope, onChange: (e) => setTimelineScope(e.target.value) }, [
                      React.createElement("option", { key: "person", value: "person" }, "person"),
                      React.createElement("option", { key: "subgraph", value: "subgraph" }, "subgraph"),
                    ]),
                    React.createElement("input", { key: "from", type: "date", value: timelineFromDate, onChange: (e) => setTimelineFromDate(e.target.value), placeholder: "From date" }),
                    React.createElement("input", { key: "to", type: "date", value: timelineToDate, onChange: (e) => setTimelineToDate(e.target.value), placeholder: "To date" }),
                    React.createElement("input", { key: "et", value: timelineEventTypes, onChange: (e) => setTimelineEventTypes(e.target.value), placeholder: "event types: world,political..." }),
                    React.createElement("button", { key: "b", type: "submit", disabled: personOptions.length === 0 }, "Load Timeline"),
                  ]),
                  React.createElement("div", { className: "list", key: "l" },
                    timeline.map((t, i) => React.createElement(
                      "div",
                      {
                        className: "item",
                        key: `${t.date}-${i}`,
                        onClick: () => onTimelineItemClick(t).catch((x) => setStatus(x.message)),
                        style: { cursor: "pointer" }
                      },
                      [
                        React.createElement("span", { className: "timeline-dot", style: { background: t.kind === "life" ? "#1e6c6d" : "#d18b3d" }, key: "dot" }),
                        `${t.date} • ${t.title}`
                      ]
                    ))
                  ),
                ]),
                React.createElement("details", { className: "card", key: "audit" }, [
                  React.createElement("summary", { key: "s" }, "Audit Logs"),
                  React.createElement("div", { className: "list", key: "l" },
                    auditLogs.map((a) => React.createElement("div", { className: "item", key: a.id }, [
                      React.createElement("div", { key: "x" }, `${a.action} • ${a.entity_type}`),
                      React.createElement("div", { className: "muted", key: "t" }, `${(a.actor_user_id || "").slice(0, 8)} • ${a.created_at.slice(0, 19).replace("T", " ")}`),
                    ]))
                  ),
                ]),
              ]) : null
            ]),
          ])
        ]);
      }

      ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
    </script>
  </body>
</html>
