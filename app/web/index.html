<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Family Tree MVP</title>
    <style>
      :root {
        --bg: #f3efe7;
        --panel: #fcfaf5;
        --line: #d7cfc2;
        --ink: #27313a;
        --muted: #62707f;
        --accent: #1e6c6d;
        --accent-soft: #dfefeb;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Source Sans Pro", "Segoe UI", sans-serif;
        color: var(--ink);
        background: radial-gradient(circle at top right, #e7f0f1, var(--bg) 45%);
      }
      .topbar {
        position: sticky;
        top: 0;
        z-index: 20;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 14px;
        background: rgba(252, 250, 245, 0.93);
        border-bottom: 1px solid var(--line);
        backdrop-filter: blur(6px);
      }
      .title {
        font-family: "Palatino Linotype", "Book Antiqua", serif;
        font-size: 24px;
        font-weight: 700;
      }
      .subtitle {
        font-size: 13px;
        color: var(--muted);
      }
      .btn {
        border: 1px solid var(--line);
        background: var(--panel);
        color: var(--ink);
        border-radius: 999px;
        padding: 6px 10px;
        cursor: pointer;
        font-size: 12px;
      }
      .shell {
        height: calc(100vh - 62px);
        display: grid;
        gap: 8px;
        padding: 8px;
      }
      .sidebar {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 12px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      .sidebar-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px;
        border-bottom: 1px solid var(--line);
      }
      .sidebar-body {
        overflow: auto;
        padding: 10px;
      }
      .collapsed {
        align-items: center;
        justify-content: center;
      }
      .collapsed .sidebar-body,
      .collapsed .sidebar-head span {
        display: none;
      }
      .card {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px;
        margin-bottom: 10px;
        background: #fff;
      }
      details.card summary {
        cursor: pointer;
        font-weight: 700;
      }
      label {
        display: block;
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 4px;
      }
      input, select, button {
        width: 100%;
        padding: 8px;
        border-radius: 8px;
        border: 1px solid var(--line);
        margin-bottom: 8px;
        background: #fff;
      }
      button {
        background: var(--accent);
        color: #fff;
        border: none;
        font-weight: 700;
        cursor: pointer;
      }
      .ghost {
        background: #516171;
      }
      .muted { color: var(--muted); font-size: 12px; }
      .list {
        max-height: 180px;
        overflow: auto;
        border: 1px dashed var(--line);
        border-radius: 8px;
        padding: 8px;
        font-size: 13px;
      }
      .item { padding: 6px 0; border-bottom: 1px dotted var(--line); }
      .item:last-child { border-bottom: none; }
      .pill {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: #2f4f4f;
        font-size: 11px;
        margin-left: 6px;
      }
      .graph-wrap {
        border: 1px solid var(--line);
        border-radius: 12px;
        background: linear-gradient(180deg, #fefefe, #f7f7f7);
        position: relative;
        overflow: hidden;
      }
      .status-badge {
        position: absolute;
        top: 10px;
        left: 10px;
        z-index: 10;
        font-size: 12px;
        color: #1f4f4f;
        background: rgba(223, 239, 235, 0.9);
        border: 1px solid #b9d7d0;
        border-radius: 999px;
        padding: 5px 10px;
      }
      .graph-scroll {
        height: 100%;
        overflow: auto;
      }
      .timeline-dot {
        display: inline-block;
        width: 9px;
        height: 9px;
        border-radius: 999px;
        margin-right: 6px;
      }
      @media (max-width: 1100px) {
        .shell { grid-template-columns: 1fr !important; height: auto; }
        .sidebar { max-height: 380px; }
        .graph-wrap { height: 70vh; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script>
      const { useEffect, useMemo, useRef, useState } = React;

      function edgeKey(fromId, toId) {
        return `${fromId}->${toId}`;
      }

      function computeLayout(subgraph, rootPersonId) {
        const nodes = subgraph?.persons || [];
        const edges = subgraph?.relationships || [];
        if (!nodes.length) return { width: 1000, height: 600, pos: {}, nodes, edges };

        const outgoing = {};
        edges.forEach((e) => {
          if (!outgoing[e.from_person_id]) outgoing[e.from_person_id] = [];
          outgoing[e.from_person_id].push(e.to_person_id);
        });

        const level = {};
        if (rootPersonId) level[rootPersonId] = 0;
        const q = rootPersonId ? [[rootPersonId, 0]] : [];
        while (q.length) {
          const [id, depth] = q.shift();
          (outgoing[id] || []).forEach((nextId) => {
            if (level[nextId] === undefined) {
              level[nextId] = depth + 1;
              q.push([nextId, depth + 1]);
            }
          });
        }
        nodes.forEach((n) => { if (level[n.id] === undefined) level[n.id] = 0; });

        const groups = {};
        nodes.forEach((n) => {
          const d = level[n.id];
          if (!groups[d]) groups[d] = [];
          groups[d].push(n);
        });

        const cols = Object.keys(groups).map(Number).sort((a, b) => a - b);
        const pos = {};
        const colGap = 260;
        const rowGap = 120;
        cols.forEach((c) => {
          groups[c].forEach((node, i) => {
            pos[node.id] = { x: 170 + c * colGap, y: 100 + i * rowGap };
          });
        });

        const maxCol = cols.length ? Math.max(...cols) : 0;
        const maxRows = Math.max(1, ...Object.values(groups).map((g) => g.length));
        const width = 360 + (maxCol + 1) * colGap;
        const height = 260 + maxRows * rowGap;
        return { width, height, pos, nodes, edges };
      }

      function GraphView({
        subgraph,
        rootPersonId,
        zoom,
        selectedNodeId,
        highlightedNodeIds,
        highlightedEdgeKeys,
        onNodeClick,
      }) {
        if (!subgraph || !subgraph.persons || !subgraph.persons.length) {
          return React.createElement("div", { className: "muted", style: { padding: "14px" } }, "Load a subgraph to begin exploration.");
        }

        const { width, height, pos, nodes, edges } = computeLayout(subgraph, rootPersonId);
        const names = {};
        nodes.forEach((n) => { names[n.id] = n.full_name; });

        return React.createElement("svg", { width: Math.ceil(width * zoom), height: Math.ceil(height * zoom) }, [
          React.createElement("g", { key: "scale", transform: `scale(${zoom})` }, [
            React.createElement("defs", { key: "defs" }, [
              React.createElement("marker", {
                key: "arrow",
                id: "arrowhead",
                markerWidth: 10,
                markerHeight: 7,
                refX: 8,
                refY: 3.5,
                orient: "auto",
              }, [
                React.createElement("polygon", { key: "poly", points: "0 0, 10 3.5, 0 7", fill: "#97a8b6" })
              ])
            ]),
            ...edges.map((e) => {
              const from = pos[e.from_person_id];
              const to = pos[e.to_person_id];
              if (!from || !to) return null;
              const isHighlighted = highlightedEdgeKeys.has(edgeKey(e.from_person_id, e.to_person_id));
              return React.createElement("g", { key: e.id }, [
                React.createElement("path", {
                  key: "line",
                  d: `M ${from.x + 80} ${from.y + 24} C ${from.x + 130} ${from.y + 24}, ${to.x - 130} ${to.y + 24}, ${to.x - 80} ${to.y + 24}`,
                  fill: "none",
                  stroke: isHighlighted ? "#d18b3d" : "#97a8b6",
                  strokeWidth: isHighlighted ? 3.5 : 2,
                  markerEnd: "url(#arrowhead)"
                }),
                React.createElement("text", {
                  key: "label",
                  x: (from.x + to.x) / 2,
                  y: (from.y + to.y) / 2 - 8,
                  textAnchor: "middle",
                  fontSize: 11,
                  fill: isHighlighted ? "#a96a26" : "#657786"
                }, e.relationship_type)
              ]);
            }),
            ...nodes.map((n) => {
              const p = pos[n.id];
              const root = n.id === rootPersonId;
              const selected = n.id === selectedNodeId;
              const highlighted = highlightedNodeIds.has(n.id);
              const fill = root ? "#1e6c6d" : selected ? "#f2c98e" : highlighted ? "#f5e6cf" : "#fff";
              const stroke = root ? "#1e6c6d" : selected ? "#b87524" : highlighted ? "#d0a36b" : "#9eb1bf";
              const textColor = root ? "#fff" : "#2b3641";
              return React.createElement("g", { key: n.id, onClick: () => onNodeClick(n.id), style: { cursor: "pointer" } }, [
                React.createElement("rect", {
                  key: "r",
                  x: p.x - 80,
                  y: p.y,
                  width: 160,
                  height: 48,
                  rx: 12,
                  fill,
                  stroke,
                  strokeWidth: selected ? 2.8 : 1.7
                }),
                React.createElement("text", {
                  key: "t",
                  x: p.x,
                  y: p.y + 29,
                  textAnchor: "middle",
                  fontSize: 12,
                  fill: textColor
                }, names[n.id] || n.id.slice(0, 8))
              ]);
            })
          ])
        ]);
      }

      function App() {
        const [users, setUsers] = useState([]);
        const [activeUserId, setActiveUserId] = useState(localStorage.getItem("activeUserId") || "");
        const [circles, setCircles] = useState([]);
        const [selectedCircle, setSelectedCircle] = useState("");
        const [members, setMembers] = useState([]);
        const [persons, setPersons] = useState([]);
        const [relationships, setRelationships] = useState([]);
        const [changeRequests, setChangeRequests] = useState([]);
        const [contextEvents, setContextEvents] = useState([]);
        const [timeline, setTimeline] = useState([]);
        const [subgraph, setSubgraph] = useState(null);
        const [lastRoot, setLastRoot] = useState("");
        const [status, setStatus] = useState("");
        const [leftOpen, setLeftOpen] = useState(true);
        const [rightOpen, setRightOpen] = useState(true);
        const [selectedPersonId, setSelectedPersonId] = useState("");
        const [highlightedNodeIds, setHighlightedNodeIds] = useState([]);
        const [highlightedEdgeKeys, setHighlightedEdgeKeys] = useState([]);
        const [zoom, setZoom] = useState(1);
        const [graphSize, setGraphSize] = useState({ width: 1000, height: 600 });
        const graphViewportRef = useRef(null);

        const headers = useMemo(() => {
          if (!activeUserId) return { "Content-Type": "application/json" };
          return { "Content-Type": "application/json", "X-User-Id": activeUserId };
        }, [activeUserId]);

        const personOptions = useMemo(() => persons.map((p) => ({ value: p.id, label: p.full_name })), [persons]);
        const activeUserName = useMemo(() => users.find((u) => u.id === activeUserId)?.display_name || "", [users, activeUserId]);
        const selectedPerson = useMemo(
          () => persons.find((p) => p.id === selectedPersonId) || (subgraph?.persons || []).find((p) => p.id === selectedPersonId) || null,
          [persons, subgraph, selectedPersonId]
        );
        const highlightedNodeSet = useMemo(() => new Set(highlightedNodeIds), [highlightedNodeIds]);
        const highlightedEdgeSet = useMemo(() => new Set(highlightedEdgeKeys), [highlightedEdgeKeys]);

        function setActiveUser(id) {
          setActiveUserId(id);
          localStorage.setItem("activeUserId", id || "");
        }

        async function requestJson(url, options = {}) {
          const res = await fetch(url, options);
          if (!res.ok) {
            const body = await res.json().catch(() => ({ detail: "Request failed" }));
            throw new Error(body.detail || "Request failed");
          }
          return res.json();
        }

        function findPathFromRoot(targetId) {
          if (!subgraph || !lastRoot || !targetId) return { nodes: [], edges: [] };
          const prev = {};
          const q = [lastRoot];
          const visited = new Set([lastRoot]);
          while (q.length) {
            const cur = q.shift();
            if (cur === targetId) break;
            (subgraph.relationships || []).forEach((edge) => {
              if (edge.from_person_id === cur && !visited.has(edge.to_person_id)) {
                visited.add(edge.to_person_id);
                prev[edge.to_person_id] = cur;
                q.push(edge.to_person_id);
              }
            });
          }
          if (!visited.has(targetId)) return { nodes: [targetId], edges: [] };
          const nodes = [];
          const edges = [];
          let cur = targetId;
          while (cur !== undefined) {
            nodes.push(cur);
            const parent = prev[cur];
            if (parent !== undefined) {
              edges.push(edgeKey(parent, cur));
            }
            cur = parent;
          }
          return { nodes: nodes.reverse(), edges: edges.reverse() };
        }

        function applyPersonFocus(personId) {
          setSelectedPersonId(personId);
          const path = findPathFromRoot(personId);
          setHighlightedNodeIds(path.nodes.length ? path.nodes : [personId]);
          setHighlightedEdgeKeys(path.edges);
        }

        function fitGraph() {
          const el = graphViewportRef.current;
          if (!el || !graphSize.width || !graphSize.height) return;
          const pad = 60;
          const nextZoom = Math.max(0.4, Math.min(1.8, Math.min((el.clientWidth - pad) / graphSize.width, (el.clientHeight - pad) / graphSize.height)));
          setZoom(nextZoom);
          el.scrollTop = 0;
          el.scrollLeft = 0;
        }

        async function loadUsers() {
          const data = await requestJson("/users");
          setUsers(data);
          if (!activeUserId && data.length) setActiveUser(data[0].id);
        }

        async function loadCircles() {
          if (!activeUserId) return setCircles([]);
          const data = await requestJson("/circles", { headers });
          setCircles(data);
          if (!data.length) return setSelectedCircle("");
          const exists = data.some((c) => c.id === selectedCircle);
          if (!selectedCircle || !exists) setSelectedCircle(data[0].id);
        }

        async function loadCircleData(circleId) {
          if (!activeUserId || !circleId) {
            setMembers([]); setPersons([]); setRelationships([]); setChangeRequests([]); setContextEvents([]); setTimeline([]);
            return;
          }
          const [m, p, r, cr, ce] = await Promise.all([
            requestJson(`/circles/${circleId}/members`, { headers }),
            requestJson(`/circles/${circleId}/persons`, { headers }),
            requestJson(`/circles/${circleId}/relationships`, { headers }),
            requestJson(`/circles/${circleId}/change-requests`, { headers }),
            requestJson(`/circles/${circleId}/context-events`, { headers }),
          ]);
          setMembers(m); setPersons(p); setRelationships(r); setChangeRequests(cr); setContextEvents(ce);
        }

        useEffect(() => { loadUsers().catch((e) => setStatus(e.message)); }, []);
        useEffect(() => {
          setSelectedCircle("");
          setSubgraph(null);
          setTimeline([]);
          setSelectedPersonId("");
          setHighlightedNodeIds([]);
          setHighlightedEdgeKeys([]);
          loadCircles().catch((e) => setStatus(e.message));
        }, [activeUserId]);
        useEffect(() => { loadCircleData(selectedCircle).catch((e) => setStatus(e.message)); }, [activeUserId, selectedCircle]);
        useEffect(() => {
          if (!subgraph) return;
          const next = computeLayout(subgraph, lastRoot);
          setGraphSize((prev) => (
            prev.width === next.width && prev.height === next.height
              ? prev
              : { width: next.width, height: next.height }
          ));
        }, [subgraph, lastRoot]);

        async function createUser(e) {
          e.preventDefault();
          const user = await requestJson("/users", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ display_name: e.target.display_name.value.trim() }),
          });
          setStatus("User created");
          e.target.reset();
          await loadUsers();
          setActiveUser(user.id);
        }

        async function createCircle(e) {
          e.preventDefault();
          const circle = await requestJson("/circles", { method: "POST", headers, body: JSON.stringify({ name: e.target.name.value.trim() }) });
          setStatus("Circle created");
          e.target.reset();
          await loadCircles();
          setSelectedCircle(circle.id);
        }

        async function addMember(e) {
          e.preventDefault();
          await requestJson(`/circles/${selectedCircle}/members`, {
            method: "POST",
            headers,
            body: JSON.stringify({ user_id: e.target.user_id.value, role: e.target.role.value }),
          });
          setStatus("Member upserted");
          await loadCircleData(selectedCircle);
        }

        async function addPerson(e) {
          e.preventDefault();
          await requestJson(`/circles/${selectedCircle}/persons`, {
            method: "POST",
            headers,
            body: JSON.stringify({ full_name: e.target.full_name.value.trim(), religion: e.target.religion.value.trim() || null }),
          });
          setStatus("Person created");
          e.target.reset();
          await loadCircleData(selectedCircle);
        }

        async function addRelationship(e) {
          e.preventDefault();
          await requestJson(`/circles/${selectedCircle}/relationships`, {
            method: "POST",
            headers,
            body: JSON.stringify({
              from_person_id: e.target.from_person_id.value,
              to_person_id: e.target.to_person_id.value,
              relationship_type: e.target.relationship_type.value.trim(),
            }),
          });
          setStatus("Relationship created");
          e.target.reset();
          await loadCircleData(selectedCircle);
        }

        async function loadSubgraph(e) {
          e.preventDefault();
          const root = e.target.root_person_id.value;
          const data = await requestJson(
            `/circles/${selectedCircle}/graph/subgraph?root_person_id=${root}&direction=${e.target.direction.value}&depth=${Number(e.target.depth.value || 2)}`,
            { headers }
          );
          setSubgraph(data);
          setLastRoot(root);
          setSelectedPersonId(root);
          setHighlightedNodeIds([root]);
          setHighlightedEdgeKeys([]);
          setZoom(1);
          setStatus(`Loaded ${data.persons.length} nodes and ${data.relationships.length} edges`);
          setTimeout(fitGraph, 0);
        }

        async function createChangeRequest(e) {
          e.preventDefault();
          await requestJson(`/circles/${selectedCircle}/change-requests`, {
            method: "POST",
            headers,
            body: JSON.stringify({
              entity_type: "person",
              entity_id: e.target.entity_id.value,
              proposed_patch_json: { religion: e.target.religion.value.trim() || null },
            }),
          });
          setStatus("Change request created");
          e.target.reset();
          await loadCircleData(selectedCircle);
        }

        async function reviewRequest(id, action) {
          await requestJson(`/circles/${selectedCircle}/change-requests/${id}/${action}`, {
            method: "POST",
            headers,
            body: JSON.stringify({ review_comment: `${action} from sidebar` }),
          });
          setStatus(`Change request ${action}`);
          await loadCircleData(selectedCircle);
        }

        async function createContextEvent(e) {
          e.preventDefault();
          await requestJson(`/circles/${selectedCircle}/context-events`, {
            method: "POST",
            headers,
            body: JSON.stringify({
              date: e.target.date.value,
              title: e.target.title.value.trim(),
              event_type: e.target.event_type.value,
              location_name: e.target.location_name.value.trim() || null,
              description: e.target.description.value.trim() || null,
            }),
          });
          setStatus("Context event created");
          e.target.reset();
          await loadCircleData(selectedCircle);
        }

        async function linkEventToPerson(e) {
          e.preventDefault();
          await requestJson(`/circles/${selectedCircle}/persons/${e.target.person_id.value}/context-links`, {
            method: "POST",
            headers,
            body: JSON.stringify({
              context_event_id: e.target.context_event_id.value,
              relevance_note: e.target.relevance_note.value.trim() || null,
            }),
          });
          setStatus("Linked event to person");
        }

        async function loadTimeline(e) {
          e.preventDefault();
          const data = await requestJson(`/circles/${selectedCircle}/persons/${e.target.person_id.value}/timeline`, { headers });
          setTimeline(data);
          setStatus(`Loaded timeline with ${data.length} items`);
        }

        async function onTimelineItemClick(item) {
          if (item.kind === "life" && item.ref_id) {
            applyPersonFocus(item.ref_id);
            setStatus("Focused timeline life event in graph");
            return;
          }
          if (item.kind === "context" && item.ref_id) {
            const linkedPersons = await requestJson(`/circles/${selectedCircle}/context-events/${item.ref_id}/persons`, { headers });
            const ids = linkedPersons.map((p) => p.id);
            setHighlightedNodeIds(ids);
            setHighlightedEdgeKeys([]);
            if (ids.length) setSelectedPersonId(ids[0]);
            setStatus(`Highlighted ${ids.length} linked person nodes`);
          }
        }

        const gridCols = `${leftOpen ? "320px" : "44px"} 1fr ${rightOpen ? "340px" : "44px"}`;

        return React.createElement(React.Fragment, null, [
          React.createElement("div", { className: "topbar", key: "top" }, [
            React.createElement("div", { key: "t" }, [
              React.createElement("div", { className: "title", key: "ttl" }, "Family Chronicle"),
              React.createElement("div", { className: "subtitle", key: "sub" }, "Trustworthy lineage mapping with contextual exploration"),
            ]),
            React.createElement("div", { key: "actions", style: { display: "flex", gap: "8px", alignItems: "center" } }, [
              React.createElement("button", { className: "btn", key: "zoom-in", onClick: () => setZoom((z) => Math.min(2.2, z + 0.15)) }, "Zoom +"),
              React.createElement("button", { className: "btn", key: "zoom-out", onClick: () => setZoom((z) => Math.max(0.35, z - 0.15)) }, "Zoom -"),
              React.createElement("button", { className: "btn", key: "fit", onClick: fitGraph }, "Fit"),
              React.createElement("button", { className: "btn", key: "reset", onClick: () => setZoom(1) }, "1:1"),
              React.createElement("button", { className: "btn", key: "l", onClick: () => setLeftOpen((v) => !v) }, leftOpen ? "Hide Left" : "Show Left"),
              React.createElement("button", { className: "btn", key: "r", onClick: () => setRightOpen((v) => !v) }, rightOpen ? "Hide Right" : "Show Right"),
            ]),
          ]),
          React.createElement("div", { className: "shell", style: { gridTemplateColumns: gridCols }, key: "shell" }, [
            React.createElement("aside", { className: `sidebar ${leftOpen ? "" : "collapsed"}`, key: "left" }, [
              React.createElement("div", { className: "sidebar-head", key: "h" }, [
                React.createElement("span", { key: "txt" }, "Setup & Records"),
                React.createElement("button", { className: "btn", key: "b", onClick: () => setLeftOpen((v) => !v) }, leftOpen ? "◀" : "▶"),
              ]),
              leftOpen ? React.createElement("div", { className: "sidebar-body", key: "body" }, [
                React.createElement("details", { className: "card", open: true, key: "u" }, [
                  React.createElement("summary", { key: "s" }, "Users & Circles"),
                  React.createElement("form", { key: "f1", onSubmit: (e) => createUser(e).catch((x) => setStatus(x.message)) }, [
                    React.createElement("input", { key: "i1", name: "display_name", required: true, placeholder: "New user name" }),
