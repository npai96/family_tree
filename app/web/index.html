<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Family Tree MVP</title>
    <style>
      :root {
        --bg: #f3efe7;
        --panel: #fcfaf5;
        --line: #d7cfc2;
        --ink: #27313a;
        --muted: #62707f;
        --accent: #1e6c6d;
        --accent-soft: #dfefeb;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Source Sans Pro", "Segoe UI", sans-serif;
        color: var(--ink);
        background: radial-gradient(circle at top right, #e7f0f1, var(--bg) 45%);
      }
      .topbar {
        position: sticky;
        top: 0;
        z-index: 20;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 14px;
        background: rgba(252, 250, 245, 0.93);
        border-bottom: 1px solid var(--line);
        backdrop-filter: blur(6px);
      }
      .title {
        font-family: "Palatino Linotype", "Book Antiqua", serif;
        font-size: 24px;
        font-weight: 700;
      }
      .subtitle {
        font-size: 13px;
        color: var(--muted);
      }
      .btn {
        border: 1px solid var(--line);
        background: var(--panel);
        color: var(--ink);
        border-radius: 999px;
        padding: 6px 10px;
        cursor: pointer;
        font-size: 12px;
      }
      .shell {
        height: calc(100vh - 62px);
        display: grid;
        gap: 8px;
        padding: 8px;
      }
      .sidebar {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 12px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      .sidebar-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px;
        border-bottom: 1px solid var(--line);
      }
      .sidebar-body {
        overflow: auto;
        padding: 10px;
      }
      .collapsed {
        align-items: center;
        justify-content: center;
      }
      .collapsed .sidebar-body,
      .collapsed .sidebar-head span {
        display: none;
      }
      .card {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px;
        margin-bottom: 10px;
        background: #fff;
      }
      details.card summary {
        cursor: pointer;
        font-weight: 700;
      }
      label {
        display: block;
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 4px;
      }
      input, select, button {
        width: 100%;
        padding: 8px;
        border-radius: 8px;
        border: 1px solid var(--line);
        margin-bottom: 8px;
        background: #fff;
      }
      button {
        background: var(--accent);
        color: #fff;
        border: none;
        font-weight: 700;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .ghost {
        background: #516171;
      }
      .muted { color: var(--muted); font-size: 12px; }
      .list {
        max-height: 180px;
        overflow: auto;
        border: 1px dashed var(--line);
        border-radius: 8px;
        padding: 8px;
        font-size: 13px;
      }
      .item { padding: 6px 0; border-bottom: 1px dotted var(--line); }
      .item:last-child { border-bottom: none; }
      .pill {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: #2f4f4f;
        font-size: 11px;
        margin-left: 6px;
      }
      .graph-wrap {
        border: 1px solid var(--line);
        border-radius: 12px;
        background: linear-gradient(180deg, #fefefe, #f7f7f7);
        position: relative;
        overflow: hidden;
      }
      .status-badge {
        position: absolute;
        top: 10px;
        left: 10px;
        z-index: 10;
        font-size: 12px;
        color: #1f4f4f;
        background: rgba(223, 239, 235, 0.9);
        border: 1px solid #b9d7d0;
        border-radius: 999px;
        padding: 5px 10px;
      }
      .graph-scroll {
        height: 100%;
        overflow: auto;
      }
      .timeline-dot {
        display: inline-block;
        width: 9px;
        height: 9px;
        border-radius: 999px;
        margin-right: 6px;
      }
      @media (max-width: 1100px) {
        .shell { grid-template-columns: 1fr !important; height: auto; }
        .sidebar { max-height: 380px; }
        .graph-wrap { height: 70vh; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script>
      const { useEffect, useMemo, useRef, useState } = React;
        const RELATIONSHIP_TYPES = [
          { value: "parent_of", label: "parent_of (A is parent of B)" },
          { value: "child_of", label: "child_of (A is child of B)" },
          { value: "spouse_of", label: "spouse_of (A and B are spouses)" },
          { value: "sibling_of", label: "sibling_of (A and B are siblings)" },
          { value: "aunt_uncle_of", label: "aunt_uncle_of (A is aunt/uncle of B)" },
          { value: "niece_nephew_of", label: "niece_nephew_of (A is niece/nephew of B)" },
          { value: "cousin_of", label: "cousin_of (A and B are cousins)" },
        ];

      function edgeKey(fromId, toId) {
        return `${fromId}->${toId}`;
      }

      function computeLayout(subgraph, rootPersonId) {
        const nodes = subgraph?.persons || [];
        const edges = subgraph?.relationships || [];
        if (!nodes.length) return { width: 1000, height: 600, pos: {}, nodes, edges };

        const outgoing = {};
        edges.forEach((e) => {
          if (!outgoing[e.from_person_id]) outgoing[e.from_person_id] = [];
          outgoing[e.from_person_id].push(e.to_person_id);
        });

        const level = {};
        if (rootPersonId) level[rootPersonId] = 0;
        const q = rootPersonId ? [[rootPersonId, 0]] : [];
        while (q.length) {
          const [id, depth] = q.shift();
          (outgoing[id] || []).forEach((nextId) => {
            if (level[nextId] === undefined) {
              level[nextId] = depth + 1;
              q.push([nextId, depth + 1]);
            }
          });
        }
        nodes.forEach((n) => { if (level[n.id] === undefined) level[n.id] = 0; });

        const groups = {};
        nodes.forEach((n) => {
          const d = level[n.id];
          if (!groups[d]) groups[d] = [];
          groups[d].push(n);
        });

        const cols = Object.keys(groups).map(Number).sort((a, b) => a - b);
        const pos = {};
        const colGap = 260;
        const rowGap = 120;
        cols.forEach((c) => {
          groups[c].forEach((node, i) => {
            pos[node.id] = { x: 170 + c * colGap, y: 100 + i * rowGap };
          });
        });

        const maxCol = cols.length ? Math.max(...cols) : 0;
        const maxRows = Math.max(1, ...Object.values(groups).map((g) => g.length));
        const width = 360 + (maxCol + 1) * colGap;
        const height = 260 + maxRows * rowGap;
        return { width, height, pos, nodes, edges };
      }

      function GraphView({
        subgraph,
        rootPersonId,
        zoom,
        selectedNodeId,
        highlightedNodeIds,
        highlightedEdgeKeys,
        onNodeClick,
      }) {
        if (!subgraph || !subgraph.persons || !subgraph.persons.length) {
          return React.createElement("div", { className: "muted", style: { padding: "14px" } }, "Load a subgraph to begin exploration.");
        }

        const { width, height, pos, nodes, edges } = computeLayout(subgraph, rootPersonId);
        const names = {};
        nodes.forEach((n) => { names[n.id] = n.full_name; });
        const undirectedTypes = new Set(["spouse_of", "sibling_of", "cousin_of", "partner_of"]);
        const displayEdgeMap = new Map();
        edges.forEach((edge) => {
          let fromId = edge.from_person_id;
          let toId = edge.to_person_id;
          let relType = edge.relationship_type;

          if (relType === "child_of") {
            fromId = edge.to_person_id;
            toId = edge.from_person_id;
            relType = "parent_of";
          } else if (relType === "niece_nephew_of") {
            fromId = edge.to_person_id;
            toId = edge.from_person_id;
            relType = "aunt_uncle_of";
          } else if (relType === "grandchild_of") {
            fromId = edge.to_person_id;
            toId = edge.from_person_id;
            relType = "grandparent_of";
          }

          if (undirectedTypes.has(relType) && fromId > toId) {
            fromId = edge.to_person_id;
            toId = edge.from_person_id;
          }

          const dedupeKey = `${fromId}|${toId}|${relType}`;
          if (!displayEdgeMap.has(dedupeKey)) {
            displayEdgeMap.set(dedupeKey, {
              id: dedupeKey,
              from_person_id: fromId,
              to_person_id: toId,
              relationship_type: relType,
            });
          }
        });
        const displayEdges = Array.from(displayEdgeMap.values());
        const pairCounts = new Map();
        displayEdges.forEach((edge) => {
          const pairKey = undirectedTypes.has(edge.relationship_type)
            ? [edge.from_person_id, edge.to_person_id].sort().join("|")
            : `${edge.from_person_id}|${edge.to_person_id}`;
          pairCounts.set(pairKey, (pairCounts.get(pairKey) || 0) + 1);
        });
        const pairSeen = new Map();

        return React.createElement("svg", { width: Math.ceil(width * zoom), height: Math.ceil(height * zoom) }, [
          React.createElement("g", { key: "scale", transform: `scale(${zoom})` }, [
            React.createElement("defs", { key: "defs" }, [
              React.createElement("marker", {
                key: "arrow",
                id: "arrowhead",
                markerWidth: 10,
                markerHeight: 7,
                refX: 8,
                refY: 3.5,
                orient: "auto",
              }, [
                React.createElement("polygon", { key: "poly", points: "0 0, 10 3.5, 0 7", fill: "#97a8b6" })
              ])
            ]),
            ...displayEdges.map((e) => {
              let fromId = e.from_person_id;
              let toId = e.to_person_id;
              let from = pos[fromId];
              let to = pos[toId];
              if (!from || !to) return null;
              const isUndirected = undirectedTypes.has(e.relationship_type);
              if (isUndirected && from.x > to.x) {
                fromId = e.to_person_id;
                toId = e.from_person_id;
                from = pos[fromId];
                to = pos[toId];
              }
              const pairKey = isUndirected
                ? [fromId, toId].sort().join("|")
                : `${fromId}|${toId}`;
              const seen = pairSeen.get(pairKey) || 0;
              pairSeen.set(pairKey, seen + 1);
              const count = pairCounts.get(
                isUndirected ? [e.from_person_id, e.to_person_id].sort().join("|") : `${e.from_person_id}|${e.to_person_id}`
              ) || 1;
              const laneOffset = (seen - (count - 1) / 2) * 14;
              const startX = from.x + 80;
              const startY = from.y + 24 + laneOffset;
              const endX = to.x - 80;
              const endY = to.y + 24 + laneOffset;
              const controlDelta = Math.max(44, Math.abs(endX - startX) * 0.35);
              const control1X = startX + controlDelta;
              const control2X = endX - controlDelta;
              const labelX = (startX + endX) / 2;
              const labelY = (startY + endY) / 2 - 9;
              const isHighlighted = (
                highlightedEdgeKeys.has(edgeKey(e.from_person_id, e.to_person_id)) ||
                highlightedEdgeKeys.has(edgeKey(e.to_person_id, e.from_person_id))
              );
              return React.createElement("g", { key: e.id }, [
                React.createElement("path", {
                  key: "line",
                  d: `M ${startX} ${startY} C ${control1X} ${startY}, ${control2X} ${endY}, ${endX} ${endY}`,
                  fill: "none",
                  stroke: isHighlighted ? "#d18b3d" : "#97a8b6",
                  strokeWidth: isHighlighted ? 3.5 : 2,
                  markerEnd: isUndirected ? undefined : "url(#arrowhead)"
                }),
                React.createElement("text", {
                  key: "label",
                  x: labelX,
                  y: labelY,
                  textAnchor: "middle",
                  fontSize: 11,
                  fill: isHighlighted ? "#a96a26" : "#657786"
                }, e.relationship_type)
              ]);
            }),
            ...nodes.map((n) => {
              const p = pos[n.id];
              const root = n.id === rootPersonId;
              const selected = n.id === selectedNodeId;
              const highlighted = highlightedNodeIds.has(n.id);
              const fill = root ? "#1e6c6d" : selected ? "#f2c98e" : highlighted ? "#f5e6cf" : "#fff";
              const stroke = root ? "#1e6c6d" : selected ? "#b87524" : highlighted ? "#d0a36b" : "#9eb1bf";
              const textColor = root ? "#fff" : "#2b3641";
              return React.createElement("g", { key: n.id, onClick: () => onNodeClick(n.id), style: { cursor: "pointer" } }, [
                React.createElement("rect", {
                  key: "r",
                  x: p.x - 80,
                  y: p.y,
                  width: 160,
                  height: 48,
                  rx: 12,
                  fill,
                  stroke,
                  strokeWidth: selected ? 2.8 : 1.7
                }),
                React.createElement("text", {
                  key: "t",
                  x: p.x,
                  y: p.y + 29,
                  textAnchor: "middle",
                  fontSize: 12,
                  fill: textColor
                }, names[n.id] || n.id.slice(0, 8))
              ]);
            })
          ])
        ]);
      }

      function App() {
        const [users, setUsers] = useState([]);
        const [activeUserId, setActiveUserId] = useState(localStorage.getItem("activeUserId") || "");
        const [authToken, setAuthToken] = useState(localStorage.getItem("authToken") || "");
        const [circles, setCircles] = useState([]);
        const [selectedCircle, setSelectedCircle] = useState("");
        const [members, setMembers] = useState([]);
        const [persons, setPersons] = useState([]);
        const [relationships, setRelationships] = useState([]);
        const [changeRequests, setChangeRequests] = useState([]);
        const [contextEvents, setContextEvents] = useState([]);
        const [timeline, setTimeline] = useState([]);
        const [personMedia, setPersonMedia] = useState([]);
        const [personPlaces, setPersonPlaces] = useState([]);
        const [selectedPlace, setSelectedPlace] = useState(null);
        const [migrationGeoJson, setMigrationGeoJson] = useState(null);
        const [discussionThreadId, setDiscussionThreadId] = useState("");
        const [discussionMessages, setDiscussionMessages] = useState([]);
        const [personRevisions, setPersonRevisions] = useState([]);
        const [duplicateHints, setDuplicateHints] = useState([]);
        const [subgraph, setSubgraph] = useState(null);
        const [lastRoot, setLastRoot] = useState("");
        const [status, setStatus] = useState("");
        const [leftOpen, setLeftOpen] = useState(true);
        const [rightOpen, setRightOpen] = useState(true);
        const [selectedPersonId, setSelectedPersonId] = useState("");
        const [highlightedNodeIds, setHighlightedNodeIds] = useState([]);
        const [highlightedEdgeKeys, setHighlightedEdgeKeys] = useState([]);
        const [zoom, setZoom] = useState(1);
        const [graphSize, setGraphSize] = useState({ width: 1000, height: 600 });
        const [editingRelationshipId, setEditingRelationshipId] = useState("");
        const [editRelationshipDraft, setEditRelationshipDraft] = useState({
          from_person_id: "",
          to_person_id: "",
          relationship_type: "parent_of",
        });
        const graphViewportRef = useRef(null);

        const headers = useMemo(() => {
          if (authToken) return { "Content-Type": "application/json", Authorization: `Bearer ${authToken}` };
          if (activeUserId) return { "Content-Type": "application/json", "X-User-Id": activeUserId };
          return { "Content-Type": "application/json" };
        }, [activeUserId, authToken]);

        const personOptions = useMemo(() => persons.map((p) => ({ value: p.id, label: p.full_name })), [persons]);
        const userOptions = useMemo(
          () => users.map((u) => ({ value: u.id, label: `${u.display_name} (${u.id.slice(0, 8)})` })),
          [users]
        );
        const activeUserName = useMemo(() => users.find((u) => u.id === activeUserId)?.display_name || "", [users, activeUserId]);
        const activeMembership = useMemo(
          () => members.find((m) => m.user_id === activeUserId) || null,
          [members, activeUserId]
        );
        const activeCircleRole = activeMembership ? activeMembership.role : null;
        const canManageMembers = activeCircleRole === "owner";
        const canEditRecords = activeCircleRole === "owner" || activeCircleRole === "editor";
        const selectedPerson = useMemo(
          () => persons.find((p) => p.id === selectedPersonId) || (subgraph?.persons || []).find((p) => p.id === selectedPersonId) || null,
          [persons, subgraph, selectedPersonId]
        );
        const highlightedNodeSet = useMemo(() => new Set(highlightedNodeIds), [highlightedNodeIds]);
        const highlightedEdgeSet = useMemo(() => new Set(highlightedEdgeKeys), [highlightedEdgeKeys]);

        function setActiveUser(id) {
          if (id !== activeUserId && authToken) {
            setToken("");
            setStatus("Signed out due to user switch. Sign in again for the selected user.");
          }
          setActiveUserId(id);
          localStorage.setItem("activeUserId", id || "");
        }

        function setToken(token) {
          setAuthToken(token || "");
          if (token) localStorage.setItem("authToken", token);
          else localStorage.removeItem("authToken");
        }

        async function requestJson(url, options = {}) {
          const res = await fetch(url, options);
          if (!res.ok) {
            const body = await res.json().catch(() => ({ detail: "Request failed" }));
            throw new Error(body.detail || "Request failed");
          }
          return res.json();
        }

        function findPathFromRoot(targetId) {
          if (!subgraph || !lastRoot || !targetId) return { nodes: [], edges: [] };
          const prev = {};
          const q = [lastRoot];
          const visited = new Set([lastRoot]);
          while (q.length) {
            const cur = q.shift();
            if (cur === targetId) break;
            (subgraph.relationships || []).forEach((edge) => {
              if (edge.from_person_id === cur && !visited.has(edge.to_person_id)) {
                visited.add(edge.to_person_id);
                prev[edge.to_person_id] = cur;
                q.push(edge.to_person_id);
              }
            });
          }
          if (!visited.has(targetId)) return { nodes: [targetId], edges: [] };
          const nodes = [];
          const edges = [];
          let cur = targetId;
          while (cur !== undefined) {
            nodes.push(cur);
            const parent = prev[cur];
            if (parent !== undefined) {
              edges.push(edgeKey(parent, cur));
            }
            cur = parent;
          }
          return { nodes: nodes.reverse(), edges: edges.reverse() };
        }

        function applyPersonFocus(personId) {
          setSelectedPersonId(personId);
          const path = findPathFromRoot(personId);
          setHighlightedNodeIds(path.nodes.length ? path.nodes : [personId]);
          setHighlightedEdgeKeys(path.edges);
        }

        function fitGraph() {
          const el = graphViewportRef.current;
          if (!el || !graphSize.width || !graphSize.height) return;
          const pad = 60;
          const nextZoom = Math.max(0.4, Math.min(1.8, Math.min((el.clientWidth - pad) / graphSize.width, (el.clientHeight - pad) / graphSize.height)));
          setZoom(nextZoom);
          el.scrollTop = 0;
          el.scrollLeft = 0;
        }

        async function loadUsers() {
          const data = await requestJson("/users");
          setUsers(data);
          if (!activeUserId && data.length) setActiveUser(data[0].id);
        }

        async function loginAsActiveUser() {
          if (!activeUserId) {
            setStatus("Select a user first");
            return;
          }
          const data = await requestJson("/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ user_id: activeUserId }),
          });
          if (data.user && data.user.id && data.user.id !== activeUserId) {
            setActiveUserId(data.user.id);
            localStorage.setItem("activeUserId", data.user.id);
          }
          setToken(data.access_token);
          setStatus("Signed in");
        }

        async function loadCircles() {
          if (!activeUserId) return setCircles([]);
          const data = await requestJson("/circles", { headers });
          setCircles(data);
          if (!data.length) return setSelectedCircle("");
          const exists = data.some((c) => c.id === selectedCircle);
          if (!selectedCircle || !exists) setSelectedCircle(data[0].id);
        }

        async function loadCircleData(circleId) {
          if (!activeUserId || !circleId) {
            setMembers([]); setPersons([]); setRelationships([]); setChangeRequests([]); setContextEvents([]); setTimeline([]);
            return;
          }
          const [m, p, r, cr, ce] = await Promise.all([
            requestJson(`/circles/${circleId}/members`, { headers }),
            requestJson(`/circles/${circleId}/persons`, { headers }),
            requestJson(`/circles/${circleId}/relationships`, { headers }),
            requestJson(`/circles/${circleId}/change-requests`, { headers }),
            requestJson(`/circles/${circleId}/context-events`, { headers }),
          ]);
          setMembers(m); setPersons(p); setRelationships(r); setChangeRequests(cr); setContextEvents(ce);
        }

        useEffect(() => { loadUsers().catch((e) => setStatus(e.message)); }, []);
        useEffect(() => {
          setSelectedCircle("");
          setSubgraph(null);
          setTimeline([]);
          setSelectedPersonId("");
          setHighlightedNodeIds([]);
          setHighlightedEdgeKeys([]);
          loadCircles().catch((e) => setStatus(e.message));
        }, [activeUserId]);
        useEffect(() => { loadCircleData(selectedCircle).catch((e) => setStatus(e.message)); }, [activeUserId, selectedCircle]);
        useEffect(() => {
          if (!subgraph) return;
          const next = computeLayout(subgraph, lastRoot);
          setGraphSize((prev) => (
            prev.width === next.width && prev.height === next.height
              ? prev
              : { width: next.width, height: next.height }
          ));
        }, [subgraph, lastRoot]);

        async function createUser(e) {
          e.preventDefault();
          const user = await requestJson("/users", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ display_name: e.target.display_name.value.trim() }),
          });
          setStatus("User created");
          e.target.reset();
          await loadUsers();
          setActiveUser(user.id);
          const auth = await requestJson("/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ user_id: user.id }),
          });
          setToken(auth.access_token);
        }

        async function createCircle(e) {
          e.preventDefault();
          const circle = await requestJson("/circles", { method: "POST", headers, body: JSON.stringify({ name: e.target.name.value.trim() }) });
          setStatus("Circle created");
          e.target.reset();
          await loadCircles();
          setSelectedCircle(circle.id);
        }

        async function addMember(e) {
          e.preventDefault();
          await requestJson(`/circles/${selectedCircle}/members`, {
            method: "POST",
            headers,
            body: JSON.stringify({ user_id: e.target.user_id.value, role: e.target.role.value }),
          });
          setStatus("Member upserted");
          await loadCircleData(selectedCircle);
        }

        async function addPerson(e) {
          e.preventDefault();
          const full_name = e.target.full_name.value.trim();
          const birth_date = e.target.birth_date.value || null;
          const birth_place = e.target.birth_place.value.trim() || null;
          const hints = await requestJson(

        async function saveRelationshipEdit(circleId) {

          const targetCircleId = circleId || selectedCircle;
          if (!targetCircleId) {

          }
          const updated = await requestJson(`/circles/${targetCircleId}/relationships/${editingRelationshipId}`, {

          if (subgraph) {
            setSubgraph((prev) => {
              if (!prev) return prev;
              const reverseId = `reverse:${updated.id}`;
              return {
                ...prev,
                relationships: (prev.relationships || []).map((r) => {
                  if (r.id === updated.id) return updated;
                  if (r.id === reverseId) {
                    return {
                      ...r,
                      from_person_id: updated.to_person_id,
                      to_person_id: updated.from_person_id,
                      relationship_type: updated.relationship_type,
                    };

                  return r;

            });
          }
